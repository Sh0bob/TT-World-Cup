    el.style.setProperty("width", width + "px", "important");
    el.style.setProperty("height", height + "px", "important");
    el.style.setProperty("margin", "0", "important");
  }

  function distanceToRectCenter(el, rect) {
    const r = el.getBoundingClientRect();
    const cx1 = r.left + r.width / 2;
    const cy1 = r.top + r.height / 2;
    const cx2 = rect.left + rect.width / 2;
    const cy2 = rect.top + rect.height / 2;
    const dx = cx1 - cx2;
    const dy = cy1 - cy2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function nearbyButtons(anchorRect, maxDistance = 420) {
    return buttons().filter(b => {
      const r = b.getBoundingClientRect();
      return r.width > 20 && r.height > 20 && distanceToRectCenter(b, anchorRect) < maxDistance;
    });
  }

  function findNearbyButton(anchorRect, text) {
    const t = text.toLowerCase();
    return nearbyButtons(anchorRect)
      .filter(b => (b.textContent || "").toLowerCase().includes(t))
      .sort((a, b) => distanceToRectCenter(a, anchorRect) - distanceToRectCenter(b, anchorRect))[0];
  }

  function findNearbyColorButton(anchorRect, exclude = []) {
    return nearbyButtons(anchorRect)
      .filter(b => {
        if (exclude.includes(b)) return false;
        const r = b.getBoundingClientRect();
        return !(b.textContent || "").trim() && r.width >= 28 && r.height >= 28 && r.width <= 90 && r.height <= 90;
      })

        <span class="ttwc-btn-subtitle">${subtitle}</span>

      findNearbyButton(inputRect, "my account") ||

    kingdomInput.classList.add("ttwc-name-input");

    setButtonCopy(
      lobbyBtn,
      "JOIN / CREATE LOBBY",
      "Access existing lobbies or create a new session",
      "ttwc-lobby"
    );

      accountBtn,
      "ACCOUNT DASHBOARD",

      "ttwc-account"
    );

    setButtonCopy(
      settingsBtn,
      "FX CLIENT SETTINGS",
      "Adjust visuals, effects, and performance",
      "ttwc-settings"
    );

    setButtonCopy(
      menuBtn,
      "GAME MENU",
      "General settings, credits, and exit game",
      "ttwc-menu"
    );

    const rects = [
      kingdomInput.getBoundingClientRect(),
      lobbyBtn.getBoundingClientRect(),
      accountBtn.getBoundingClientRect(),
      settingsBtn.getBoundingClientRect(),
      menuBtn.getBoundingClientRect()
    ];

    if (colorButton) rects.push(colorButton.getBoundingClientRect());

    const left = Math.min(...rects.map(r => r.left));
    const top = Math.min(...rects.map(r => r.top));
    const right = Math.max(...rects.map(r => r.right));
    const bottom = Math.max(...rects.map(r => r.bottom));

    const padX = 18;
    const padTop = 18;
    const padBottom = 16;

    panel.style.left = Math.round(left - padX) + "px";
    panel.style.top = Math.round(top - padTop) + "px";
    panel.style.width = Math.round((right - left) + padX * 2) + "px";
    panel.style.height = Math.round((bottom - top) + padTop + padBottom) + "px";
    panel.style.display = "block";

    const rInput = kingdomInput.getBoundingClientRect();
    nameIcon.style.left = Math.round(rInput.left + 12) + "px";
    nameIcon.style.top = Math.round(rInput.top + (rInput.height - 30) / 2) + "px";
    nameIcon.style.width = "30px";
    nameIcon.style.height = "30px";
    nameIcon.style.display = "block";
  }

  function applyStable() {
    requestAnimationFrame(() => {
      apply();
      requestAnimationFrame(() => {
        apply();
        setTimeout(apply, 60);
        setTimeout(apply, 180);
      });
    });
  }

  applyStable();

  new MutationObserver(() => applyStable())
    .observe(document.body, { childList: true, subtree: true, attributes: true });

  window.addEventListener("visibilitychange", applyStable);

  let tries = 0;
  const interval = setInterval(() => {
    applyStable();
    tries++;
    if (tries > 120) clearInterval(interval);
  }, 250);

  console.log("[TTWC] menu reskin stable mode active");
})();

      // Hide/block normal peace availability for non-hosts in custom lobbies
      aw.ht = function(player) {
  // In custom lobbies: ALWAYS allow the actual host's peace call to pass,
  // on every client, regardless of that client's local state.
  try {
    if (isCustomLobbyActive()) {
      // If we know the lobby players array, trust its host flag.
      if (
        Array.isArray(TTWC.peace.players) &&
        TTWC.peace.players[player] &&
        TTWC.peace.players[player].isHost
      ) {
        return true;
      }
    }
  } catch (e) {}

  // Block non-host self from initiating peace in custom lobbies
  if (
    isCustomLobbyActive() &&
    typeof aD !== "undefined" &&
    player === aD.eo &&
    !isHost()
  ) {
    return false;
  }

  return TTWC.peace.originalAwHt.apply(this, arguments);
};

      // Enforce host-only at the actual peace-send call site
      b8.pG.hp = function(player) {
        try {
          if (
            isCustomLobbyActive() &&
            typeof aD !== "undefined" &&
            player === aD.eo &&
            !isHost()
          ) {
            console.log("[TTWC PEACE] blocked non-host peace send");
            return;
          }
        } catch (e) {}
        return TTWC.peace.originalPeaceSend.apply(this, arguments);
      };

      TTWC.peace.patched = true;
      console.log("[TTWC PEACE] host-only peace patch active");
      return true;
    } catch (e) {
      console.log("[TTWC PEACE] patchPeaceFunctions error:", e);
      return false;
    }
  }

  function sendHostPeaceDirect() {
  try {
    if (!isCustomLobbyActive()) return;
    if (!isHost()) {
      console.log("[TTWC PEACE] not host, direct peace send denied");
      return;
    }

    const now = Date.now();
    if (now - TTWC.peace.lastSendAt < 700) {
      return;
    }
    TTWC.peace.lastSendAt = now;

    if (typeof aD === "undefined") {
      console.log("[TTWC PEACE] aD not ready");
      return;
    }

    const normalCheckAllows = !!(
      TTWC.peace.originalAwHt && TTWC.peace.originalAwHt.call(aw, aD.eo)
    );

    console.log("[TTWC PEACE] host direct peace send", {
      customLobby: true,
      self: aD.eo,
      normalCheckAllows
    });

    // Custom lobby broadcast so other clients see it (custom lobbies may not support vanilla peace packets).
    try {
      const sent = sendCustomLobbyMessage({ t: "peace", d: { from: aD.eo, at: Date.now() } });
      if (sent) {
        console.log("[TTWC PEACE] sent custom peace broadcast");
      }
    } catch (e) {}

    // Send over the real multiplayer transport so other clients observe it.
    // In game.js, peace vote is `b0.pL.pY(513)` when not `aD.kj`.
    if (typeof b0 !== "undefined" && b0.pL && typeof b0.pL.pY === "function") {
      console.log("[TTWC PEACE] using b0.pL.pY transport");
      return b0.pL.pY(513);
    }

    // If the helper isn't available (or custom lobby toggles aD.kj), build and send the exact packet.
    // From game.js `pY(jY)`: bD.a7(15), bD.a8(1, 1), bD.a8(4, 5), bD.a8(10, jY), b0.y.send(b0.y.a2C, bD.aC)
    if (
      typeof b0 !== "undefined" &&
      b0.y &&
      typeof b0.y.send === "function" &&
      typeof b0.y.a2C !== "undefined" &&
      typeof bD !== "undefined" &&
      typeof bD.a7 === "function" &&
      typeof bD.a8 === "function"
    ) {
      try {
        bD.a7(15);
        bD.a8(1, 1);
        bD.a8(4, 5);
        bD.a8(10, 513);
        console.log("[TTWC PEACE] sending raw peace packet", { socket: b0.y.a2C });
        // Prefer the lobby's configured send hook if present (custom lobbies may wrap routing here)
        if (typeof __fx !== "undefined" && __fx.customLobby && typeof __fx.customLobby.send === "function") {
          console.log("[TTWC PEACE] using __fx.customLobby.send transport");
          return __fx.customLobby.send(b0.y.a2C, bD.aC);
        }
        console.log("[TTWC PEACE] using b0.y.send transport");
        return b0.y.send(b0.y.a2C, bD.aC);
      } catch (e) {
        console.log("[TTWC PEACE] raw peace packet send failed", e);
      }
    }

    // Fallback: use the game's in-game handler (may be local-only in some modes).
    if (TTWC.peace.originalPeaceSend) {
      return TTWC.peace.originalPeaceSend.call(b8.pG, aD.eo);
    }

    // Last resort: emit the action locally (may not broadcast).
    if (window.b9 && b9.qB && typeof b9.qB.qC === "function") {
      b9.qB.qC(5, aD.eo, 513);
      if (window.aw && typeof aw.hp === "function") {
        aw.hp(aD.eo);
      }
      return;
    }

    console.log("[TTWC PEACE] peace send APIs not ready");
  } catch (e) {
    console.log("[TTWC PEACE] sendHostPeaceDirect error:", e);
  }
}

  // Host-only floating button
  const peaceBtn = document.createElement("button");
  peaceBtn.id = "ttwc-host-peace-btn";
  peaceBtn.textContent = "Host Peace";
  Object.assign(peaceBtn.style, {
    position: "fixed",
    top: "14px",
    right: "14px",
    zIndex: "99999",
    padding: "10px 14px",
    fontSize: "14px",
    fontWeight: "700",
    borderRadius: "10px",
    border: "1px solid rgba(255,255,255,0.25)",
    background: "rgba(20,20,20,0.85)",
    color: "#fff",
    cursor: "pointer",
    display: "none"
  });

  peaceBtn.addEventListener("click", () => {
    sendHostPeaceDirect();
  });

  document.body.appendChild(peaceBtn);

  function updatePeaceButton() {
    try {
      const show =
        isCustomLobbyActive() &&
        !isMainMenu() &&
        isHost() &&
        window.b8 &&
        b8.hU &&
        typeof b8.hU.hp === "function";

      peaceBtn.style.display = show ? "block" : "none";

      if (show) {
        let dead = false;
        try {
          dead = !!(
            typeof aD !== "undefined" &&
            typeof aw !== "undefined" &&
            TTWC.peace.originalAwHt &&
            !TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (e) {}

        peaceBtn.textContent = dead ? "Host Peace (dead)" : "Host Peace";
      }
    } catch (e) {}

    requestAnimationFrame(updatePeaceButton);
  }
  requestAnimationFrame(updatePeaceButton);

  // Dead-host keyboard fallback:
  // If host is dead, pressing P will still send the real peace packet.
  document.addEventListener("keydown", function(e) {
    try {
      if (e.repeat) return;
      if (!isCustomLobbyActive()) return;
      if (!isHost()) return;

      const tag = e.target && e.target.tagName ? e.target.tagName.toUpperCase() : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target?.isContentEditable) return;

      if (e.key === "p" || e.key === "P") {
        let normalGameAllowsIt = false;
        try {
          normalGameAllowsIt = !!(
            TTWC.peace.originalAwHt &&
            typeof aD !== "undefined" &&
            TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (err) {}

        // Only force-send if the normal game would block it (dead host case)
        if (!normalGameAllowsIt) {
          e.preventDefault();
          e.stopPropagation();
          sendHostPeaceDirect();
        }
      }
    } catch (err) {
      console.log("[TTWC PEACE] keydown handler error:", err);
    }
  }, true);

  const interval = setInterval(() => {
    const a = patchCustomLobbyHostTracking();
    const b = patchPeaceFunctions();
    if (a && b) {
      clearInterval(interval);
    }
  }, 500);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.peace = TTWC.peace || {};

  function installPeaceTracing() {
    try {
      if (!window.b8 || !window.b9 || !window.aw || !window.__fx) return false;
      if (!b8.hU || typeof b8.hU.hp !== "function") return false;
      if (!b8.pG || typeof b8.pG.hp !== "function") return false;
      if (!b9.qB || typeof b9.qB.qC !== "function") return false;
      if (!__fx.customLobby || typeof __fx.customLobby.isActive !== "function") return false;
      if (TTWC.peace.tracingInstalled) return true;

      TTWC.peace._origTrace_hUhp = b8.hU.hp;
      TTWC.peace._origTrace_pGhp = b8.pG.hp;
      TTWC.peace._origTrace_qC = b9.qB.qC;

      b8.hU.hp = function() {
        console.log("[TTWC TRACE] b8.hU.hp called", {
          customLobby: !!(__fx.customLobby && __fx.customLobby.isActive && __fx.customLobby.isActive()),
          aD_kj: typeof aD !== "undefined" ? aD.kj : undefined,
          self: typeof aD !== "undefined" ? aD.eo : undefined
        });
        return TTWC.peace._origTrace_hUhp.apply(this, arguments);
      };

      b8.pG.hp = function(player) {
  console.log("[TTWC TRACE] b8.pG.hp called", {
    player,
    self: typeof aD !== "undefined" ? aD.eo : undefined,
    forceHostPeaceOnce: !!TTWC.peace.forceHostPeaceOnce
  });

  return TTWC.peace._origTrace_pGhp.apply(this, arguments);
};
      b9.qB.qC = function() {
        const args = Array.from(arguments);
        if (args[0] === 5 && args[2] === 513) {
          console.log("[TTWC TRACE] qC peace action", {
            args,
            self: typeof aD !== "undefined" ? aD.eo : undefined
          });
        }
        return TTWC.peace._origTrace_qC.apply(this, arguments);
      };

      if (__fx.customLobby.send && typeof __fx.customLobby.send === "function") {
        TTWC.peace._origTrace_customSend = __fx.customLobby.send;
        __fx.customLobby.send = function() {
          console.log("[TTWC TRACE] __fx.customLobby.send called", {
            args: Array.from(arguments)
          });
          return TTWC.peace._origTrace_customSend.apply(this, arguments);
        };
      }

      TTWC.peace.tracingInstalled = true;
      console.log("[TTWC TRACE] peace tracing installed");
      return true;
    } catch (e) {
      console.log("[TTWC TRACE] installPeaceTracing error:", e);
      return false;
    }
  }

  const traceInterval = setInterval(() => {
    if (installPeaceTracing()) clearInterval(traceInterval);
  }, 500);
})();
</script>


<script>
(() => {
  const video = document.getElementById("ttwc-bg-video");

  function shouldShowVideo() {
    // Keep video visible on menu and FX windows like custom lobby/settings.
    // Hide only once an actual game canvas state is underway and menu UI is gone.
    const kingdomInput = document.querySelector('input[placeholder*="Kingdom"]');
    const fxWindow = document.querySelector('.window:not(.d-none)');
    return !!kingdomInput || !!fxWindow;
  }

  function tick() {
    const show = shouldShowVideo();
    video.style.display = show ? "block" : "none";

    if (show && video.paused) {
      video.play().catch(() => {});
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};

  TTWC.matchReport = TTWC.matchReport || {};
  TTWC.matchReport.sentForRound = false;
  TTWC.matchReport.lastSentAt = 0;
  TTWC.matchReport.lastPayloadHash = null;

  function getEndpoint() {
    try {
      return (
        TTWC.matchReport.endpoint ||
        localStorage.getItem("ttwc_match_report_endpoint") ||
        ""
      ).trim();
    } catch {
      return "";
    }
  }

  function getLobbyCode() {
    try {
      const hash = window.location.hash || "";
      const m = hash.match(/#lobby=([^&]+)/);
      return m ? m[1] : undefined;
    } catch {
      return undefined;
    }
  }

  function buildPayload() {
    try {
      const getter = window.__TTWC?.getLeaderboardSnapshot;

      if (typeof getter !== "function") {
        console.log("[TTWC] getLeaderboardSnapshot() is not available yet");
        return null;
      }

      const snapshot = getter();
      if (!Array.isArray(snapshot) || snapshot.length === 0) {
        console.log("[TTWC] leaderboard snapshot empty");
        return null;
      }

      const humanNameSet = new Set(
  Array.isArray(TTWC.humanNames)
    ? TTWC.humanNames.map(n => String(n).trim()).filter(Boolean)
    : []
);

const leaderboard = snapshot
  .map((p, index) => ({
    id: Number(p.id ?? p.playerId ?? index),
    name: String(p.name ?? p.displayName ?? `Player ${index + 1}`).trim(),
    territory: Number(p.territory ?? p.score ?? 0),
    troops: Number(p.troops ?? 0)
  }))
  .filter(row => row.name && !Number.isNaN(row.territory))
  .filter(row => humanNameSet.size === 0 || humanNameSet.has(row.name));
      
      if (leaderboard.length === 0) {
        console.log("[TTWC] no usable leaderboard rows");
        return null;
console.log("[TTWC] human names:", [...humanNameSet]);
console.log("[TTWC] filtered leaderboard:", leaderboard);
      }

      const meta = {
        title: "TTWC Custom Lobby Match Finished",
        endedAt: Date.now(),
        lobbyCode: getLobbyCode(),
        resultType: TTWC.resultType || undefined,
        mode: window.__fx?.customLobby?.gameInfo?.mode,
        map: window.__fx?.customLobby?.gameInfo?.map,
        botCount: window.__fx?.customLobby?.gameInfo?.botCount,
        matchId: `${Date.now()}-${getLobbyCode() || "nolobby"}`
      };

      return { meta, leaderboard };
    } catch (e) {
      console.log("[TTWC] buildPayload failed", e);
      return null;
    }
  }

  function makePayloadHash(payload) {
    try {
      return JSON.stringify({
        resultType: payload?.meta?.resultType,
        lobbyCode: payload?.meta?.lobbyCode,
        leaderboard: (payload?.leaderboard || []).map(p => [
          p.id,
          p.name,
          p.territory,
          p.troops
        ])
      });
    } catch {
      return null;
    }
  }

  async function postSnapshot(payload) {
    const url = getEndpoint();
    if (!url) {
      console.log("[TTWC] no endpoint set");
      return false;
    }

    try {
      const resp = await fetch(url, {
        method: "POST",
        headers: {
          "content-type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) {
        console.log("[TTWC] match report failed", resp.status);
        return false;
      }

      console.log("[TTWC] match report sent");
      return true;
    } catch (e) {
      console.log("[TTWC] match report error", e);
      return false;
    }
  }

  function resetForNextRound() {
  TTWC.matchReport.sentForRound = false;
  TTWC.matchReport.lastPayloadHash = null;
  TTWC.matchReport.lastSentAt = 0;
  TTWC.resultType = null;
  TTWC.endScreenShown = false;
}

  function isMainMenu() {
    try {
      return !!document.querySelector('input[placeholder*="Kingdom"]');
    } catch {
      return false;
    }
  }

  function shouldSendFromThisTab() {
  try {
    const hostInfo = {
      fxIsHost: window.__fx?.customLobby?.isHost,
      ttwcIsHost: window.__TTWC?.isHost,
      selfLobbyIndex: window.__TTWC?.selfLobbyIndex
    };

    console.log("[TTWC] host check:", hostInfo);

    if (window.__fx?.customLobby?.isHost === true) return true;
    if (window.__fx?.customLobby?.isHost === false) return false;

    if (window.__TTWC?.isHost === true) return true;
    if (window.__TTWC?.isHost === false) return false;

    if (typeof window.__TTWC?.selfLobbyIndex === "number") {
      return window.__TTWC.selfLobbyIndex === 0;
    }
  } catch (e) {
    console.log("[TTWC] shouldSendFromThisTab error", e);
  }

  return false;
}

  async function tick() {
    try {
      const hasFinished =
        TTWC.endScreenShown ||
        TTWC.resultType === "victory" ||
        TTWC.resultType === "stalemate";

      if (hasFinished && shouldSendFromThisTab() && !TTWC.matchReport.sentForRound) {
        const now = Date.now();

        if (now - (TTWC.matchReport.lastSentAt || 0) > 2000) {
          TTWC.matchReport.lastSentAt = now;

          const payload = buildPayload();
          if (payload) {
            const hash = makePayloadHash(payload);

            if (hash && hash === TTWC.matchReport.lastPayloadHash) {
              console.log("[TTWC] duplicate payload skipped");
            } else {
              const ok = await postSnapshot(payload);
              if (ok) {
                TTWC.matchReport.sentForRound = true;
                TTWC.matchReport.lastPayloadHash = hash;
              }
            }
          }
        }
      }

      if (isMainMenu() && TTWC.matchReport.sentForRound) {
        resetForNextRound();
      }
    } catch (e) {
      console.log("[TTWC] tick error", e);
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
