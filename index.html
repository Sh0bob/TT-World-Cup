  <script>
(() => {
  const labels = [
    "Top Clan",
    "Best Clan Member",
    "Top Admin",
    "Best 1v1 Player"
  ];

  function hideLeaderboard() {
    const nodes = Array.from(document.querySelectorAll("div, span, button"));
    const hit = nodes.find(el =>
      labels.some(label => (el.innerText || "").includes(label))
    );

    if (!hit) return;

    let panel = hit;
    for (let i = 0; i < 8 && panel; i++, panel = panel.parentElement) {
      const r = panel.getBoundingClientRect();
      if (
        r.width > 200 &&
        r.height > 40 &&
        r.left < window.innerWidth * 0.4 &&
        r.top > window.innerHeight * 0.6
      ) {
        panel.style.setProperty("display", "none", "important");
        return;
      }
    }
  }

  function tick() {
    hideLeaderboard();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

  <script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.humanNames = [];
  TTWC.anonMap = new Map();
  TTWC.endScreenShown = false;
  TTWC.roundSeeded = false;
  TTWC.lastRoundMarker = "";
  TTWC.autoClickDone = false;

  function onMainMenu() {
    const el = document.querySelector('input[placeholder*="Kingdom"]');
    if (!el) return false;
    const style = getComputedStyle(el);
    if (style.display === "none" || style.visibility === "hidden" || style.opacity === "0") return false;
    const rect = el.getBoundingClientRect();
    return rect.width > 0 && rect.height > 0;
  }

  function getAnon(realName) {
    if (!TTWC.anonMap.has(realName)) {
      TTWC.anonMap.set(realName, "Anon " + Math.floor(100 + Math.random() * 900));
    }
    return TTWC.anonMap.get(realName);
  }

  function resetRound() {
    TTWC.humanNames = [];
    TTWC.anonMap.clear();
    TTWC.endScreenShown = false;
    TTWC.roundSeeded = false;
    TTWC.autoClickDone = false;
  }

  function shouldAnonymise() {
    if (onMainMenu()) {
      resetRound();
      return false;
    }
    if (TTWC.endScreenShown) return false;
    return TTWC.humanNames.length > 0;
  }

  function replaceExactNames(text) {
    let out = text;
    const sorted = [...TTWC.humanNames].sort((a, b) => b.length - a.length);

    for (const realName of sorted) {
      const anon = getAnon(realName);

      if (out.includes(realName)) {
        out = out.split(realName).join(anon);
      }

      if (realName.length > 4) {
        const trunc3 = realName.slice(0, Math.max(1, realName.length - 3)) + "...";
        const trunc1 = realName.slice(0, Math.max(1, realName.length - 1)) + "…";

        if (out.includes(trunc3)) out = out.split(trunc3).join(anon);
        if (out.includes(trunc1)) out = out.split(trunc1).join(anon);
      }
    }

    return out;
  }

  function patchPlayerList() {
    const pl = window.__fx?.playerList;
    if (!pl || pl.__ttwcPatched) return;

    const originalDisplay = pl.display;

    pl.display = function(names) {
      const result = originalDisplay.apply(this, arguments);

      try {
        const listRoot = document.getElementById("playerlist");
        const text = listRoot?.innerText || "";
        const match = text.match(/Players\s*\((\d+)\)/i);

        if (Array.isArray(names) && match) {
          const humanCount = parseInt(match[1], 10);
          TTWC.humanNames = names.slice(0, humanCount);
          TTWC.roundSeeded = true;

          // close the list immediately so users don't see it pop up
          try {
            window.__fx?.WindowManager?.closeWindow?.("playerList");
          } catch {}
        }
      } catch {}

      return result;
    };

    pl.__ttwcPatched = true;
    console.log("[TTWC] playerList hook installed");
  }

  const originalFillText = CanvasRenderingContext2D.prototype.fillText;
  const originalDrawImage = CanvasRenderingContext2D.prototype.drawImage;

  CanvasRenderingContext2D.prototype.drawImage = function(...args) {
    try {
      const img = args[0];
      const defeatImg = window.ab?.aHK?.("defeat");
      const victoryImg = window.ab?.aHK?.("victory");

      if (img && (img === defeatImg || img === victoryImg)) {
        TTWC.endScreenShown = true;
      }
    } catch {}

    return originalDrawImage.apply(this, args);
  };

  CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
    try {
      if (typeof text === "string") {
        if (text.includes("Choose your start position!")) {
          if (TTWC.lastRoundMarker !== "spawn") {
            resetRound();
            TTWC.lastRoundMarker = "spawn";
          }
        }

        if (shouldAnonymise()) {
          text = replaceExactNames(text);
        }
      }
    } catch {}

    return originalFillText.call(this, text, x, y, maxWidth);
  };

  const hookTimer = setInterval(() => {
    patchPlayerList();

    // Never try anything on menu / lobby
    if (!onMainMenu() && TTWC.lastRoundMarker === "spawn" && !TTWC.roundSeeded) {
      // Wait for one manual or automatic player-list display hook only during round start

<script>
(() => {
  function isVisible(el) {
    if (!el) return false;
    const r = el.getBoundingClientRect();
    const s = getComputedStyle(el);
    return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden";
  }

  function buttons() {
    return Array.from(document.querySelectorAll("button"));
  }

  function distanceToRectCenter(el, rect) {
    const r = el.getBoundingClientRect();
    const cx1 = r.left + r.width / 2;
    const cy1 = r.top + r.height / 2;
    const cx2 = rect.left + rect.width / 2;
    const cy2 = rect.top + rect.height / 2;
    const dx = cx1 - cx2;
    const dy = cy1 - cy2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function nearbyButtons(anchorRect, maxDistance = 420) {
    return buttons().filter(b => {
      const r = b.getBoundingClientRect();
      return r.width > 20 && r.height > 20 && distanceToRectCenter(b, anchorRect) < maxDistance;
    });
  }

  function findNearbyButton(anchorRect, text) {
    const t = text.toLowerCase();
    return nearbyButtons(anchorRect)
      .filter(b => (b.textContent || "").toLowerCase().includes(t))
      .sort((a, b) => distanceToRectCenter(a, anchorRect) - distanceToRectCenter(b, anchorRect))[0];
  }

  function findNearbyColorButton(anchorRect, exclude = []) {
    return nearbyButtons(anchorRect)
      .filter(b => {
        if (exclude.includes(b)) return false;
        const r = b.getBoundingClientRect();
        return !(b.textContent || "").trim() && r.width >= 28 && r.height >= 28 && r.width <= 90 && r.height <= 90;
      })
      .sort((a, b) => distanceToRectCenter(a, anchorRect) - distanceToRectCenter(b, anchorRect))[0];
  }

  function findPanelButton(anchorRect, exclude = []) {
    return nearbyButtons(anchorRect, 520)
      .filter(b => !exclude.includes(b))
      .filter(b => {
        const r = b.getBoundingClientRect();
        return r.width > 250 && r.height > 180;
      })
      .sort((a, b) => {
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        return (br.width * br.height) - (ar.width * ar.height);
      })[0];
  }

  function setButtonCopy(btn, title, subtitle, extraClass) {
    if (!btn) return;
    btn.classList.add("ttwc-menu-btn", extraClass);

    const html = `
      <span class="ttwc-btn-copy">
        <span class="ttwc-btn-title">${title}</span>
      </span>
    `;

    if (btn.dataset.ttwcHtml !== html) {
      btn.innerHTML = html;
      btn.dataset.ttwcHtml = html;
    }
  }

  function applyMenuSkin() {
    const kingdomInput = document.querySelector('input[placeholder*="Kingdom"]');
    if (!isVisible(kingdomInput)) {
  return;
}

    document.body.classList.add("ttwc-ui-reskin");

    const inputRect = kingdomInput.getBoundingClientRect();

    const lobbyBtn = findNearbyButton(inputRect, "join/create custom lobby");
    const settingsBtn = findNearbyButton(inputRect, "TTWC client settings");
    const menuBtn = findNearbyButton(inputRect, "game menu");
    const colorBtn = findNearbyColorButton(inputRect, [lobbyBtn, settingsBtn, menuBtn]);
    const panelBtn = findPanelButton(inputRect, [lobbyBtn, settingsBtn, menuBtn, colorBtn]);

    if (panelBtn) {
      panelBtn.classList.add("ttwc-panel-btn");
      panelBtn.innerHTML = "";
      panelBtn.textContent = "";
    }

    if (lobbyBtn) {
      setButtonCopy(
        lobbyBtn,
        "JOIN / CREATE LOBBY",
        "Access existing lobbies or create a new session",
        "ttwc-lobby"
      );
    }

    if (settingsBtn) {
      setButtonCopy(
        settingsBtn,
        "TTWC CLIENT SETTINGS",
        "Adjust visuals, effects, and performance",
        "ttwc-settings"
      );
    }

    if (menuBtn) {
      setButtonCopy(
        menuBtn,
        "GAME MENU",
        "General settings, credits, and exit game",
        "ttwc-menu"
      );
    }

    kingdomInput.classList.add("ttwc-name-input");
    if (colorBtn) colorBtn.classList.add("ttwc-color-btn");

  }

  function refreshMenuSkin() {
    requestAnimationFrame(applyMenuSkin);
    setTimeout(applyMenuSkin, 80);
    setTimeout(applyMenuSkin, 180);
  }

  refreshMenuSkin();

  new MutationObserver(() => refreshMenuSkin())
    .observe(document.body, { childList: true, subtree: true });

  window.addEventListener("resize", refreshMenuSkin);
  window.addEventListener("fullscreenchange", refreshMenuSkin);
})();

        aw.hp(aD.eo);
      }
      return;
    }

    console.log("[TTWC PEACE] peace send APIs not ready");
  } catch (e) {
    console.log("[TTWC PEACE] sendHostPeaceDirect error:", e);
  }
}

  // Host-only floating button
  const peaceBtn = document.createElement("button");
  peaceBtn.id = "ttwc-host-peace-btn";
  peaceBtn.textContent = "Host Peace";
  Object.assign(peaceBtn.style, {
    position: "fixed",
    top: "14px",
    right: "14px",
    zIndex: "99999",
    padding: "10px 14px",
    fontSize: "14px",
    fontWeight: "700",
    borderRadius: "10px",
    border: "1px solid rgba(255,255,255,0.25)",
    background: "rgba(20,20,20,0.85)",
    color: "#fff",
    cursor: "pointer",
    display: "none"
  });

  peaceBtn.addEventListener("click", () => {
    sendHostPeaceDirect();
  });

  document.body.appendChild(peaceBtn);

  function updatePeaceButton() {
    try {
      const show =
        isCustomLobbyActive() &&
        !isMainMenu() &&
        isHost() &&
        window.b8 &&
        b8.hU &&
        typeof b8.hU.hp === "function";

      peaceBtn.style.display = show ? "block" : "none";

      if (show) {
        let dead = false;
        try {
          dead = !!(
            typeof aD !== "undefined" &&
            typeof aw !== "undefined" &&
            TTWC.peace.originalAwHt &&
            !TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (e) {}

        peaceBtn.textContent = dead ? "Host Peace (dead)" : "Host Peace";
      }
    } catch (e) {}

    requestAnimationFrame(updatePeaceButton);
  }
  requestAnimationFrame(updatePeaceButton);

  // Dead-host keyboard fallback:
  // If host is dead, pressing P will still send the real peace packet.
  document.addEventListener("keydown", function(e) {
    try {
      if (e.repeat) return;
      if (!isCustomLobbyActive()) return;
      if (!isHost()) return;

      const tag = e.target && e.target.tagName ? e.target.tagName.toUpperCase() : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target?.isContentEditable) return;

      if (e.key === "p" || e.key === "P") {
        let normalGameAllowsIt = false;
        try {
          normalGameAllowsIt = !!(
            TTWC.peace.originalAwHt &&
            typeof aD !== "undefined" &&
            TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (err) {}

        // Only force-send if the normal game would block it (dead host case)
        if (!normalGameAllowsIt) {
          e.preventDefault();
          e.stopPropagation();
          sendHostPeaceDirect();
        }
      }
    } catch (err) {
      console.log("[TTWC PEACE] keydown handler error:", err);
    }
  }, true);

  const interval = setInterval(() => {
    const a = patchCustomLobbyHostTracking();
    const b = patchPeaceFunctions();
    if (a && b) {
      clearInterval(interval);
    }
  }, 500);

  function tickClientIdentity() {
    try {
      if (isCustomLobbyActive()) {
        announceThisClient();
        if (isHost()) {
          broadcastClientRoster();
        }
      }
    } catch (e) {}

    setTimeout(tickClientIdentity, 3000);
  }

  setTimeout(tickClientIdentity, 3000);
})();
</script>

<script>
// Inject TTWC / Other badges directly into custom-lobby player rows.
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.peace = TTWC.peace || {};

  function isCustomLobbyActive() {
    try {
      return !!(
        window.__fx &&
        __fx.customLobby &&
        typeof __fx.customLobby.isActive === "function" &&
        __fx.customLobby.isActive()
      );
    } catch {
      return false;
    }
  }

  function getClientLabel(index) {
    const player = Array.isArray(TTWC.peace.players) ? TTWC.peace.players[index] : null;
    const rawLabel = (player && player.client) || TTWC.client?.byIndex?.[index] || "Other";
    const isSelf =
      (typeof TTWC.peace.selfLobbyIndex === "number" && TTWC.peace.selfLobbyIndex === index) ||
      (player && TTWC.client?.selfName && String(player.name) === TTWC.client.selfName);

    if (isSelf) return "TTWC";
    return rawLabel === "TTWC" ? "TTWC" : "Other";
  }

  function getActionRows() {
    const actionButtons = Array.from(document.querySelectorAll("button"))
      .filter(btn => {
        const text = (btn.textContent || "").trim().toLowerCase();
        return text === "host" || text === "kick";
      });

    const rowMap = new Map();
    for (const btn of actionButtons) {
      const row = btn.parentElement;
      if (!row) continue;
      if (!rowMap.has(row)) {
        rowMap.set(row, {
          row,
          buttons: []
        });
      }
      rowMap.get(row).buttons.push(btn);
    }

    return Array.from(rowMap.values())
      .sort((a, b) => {
        const ar = a.row.getBoundingClientRect();
        const br = b.row.getBoundingClientRect();
        return ar.top - br.top;
      });
  }

  function applyBadge(rowInfo, index) {
    const row = rowInfo?.row;
    if (!row) return;

    const label = getClientLabel(index);
    let badge = row.querySelector(".ttwc-client-row-badge");

    if (!badge) {
      badge = document.createElement("span");
      badge.className = "ttwc-client-row-badge";
      Object.assign(badge.style, {
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        minWidth: "52px",
        height: "24px",
        padding: "0 8px",
        marginRight: "6px",
        borderRadius: "999px",
        fontSize: "12px",
        fontWeight: "700",
        fontFamily: "Arial, Helvetica, sans-serif",
        color: "#fff",
        verticalAlign: "middle",
        boxSizing: "border-box"
      });

      const anchor = rowInfo.buttons
        .slice()
        .sort((a, b) => a.getBoundingClientRect().left - b.getBoundingClientRect().left)[0];

      if (anchor && anchor.parentNode) {
        anchor.parentNode.insertBefore(badge, anchor);
      } else {
        row.appendChild(badge);
      }
    }

    badge.textContent = label;
    badge.style.background = label === "TTWC"
      ? "linear-gradient(180deg, #1f8f60, #146542)"
      : "linear-gradient(180deg, #707780, #4d545d)";
    badge.style.border = label === "TTWC"
      ? "1px solid rgba(180,255,220,0.45)"
      : "1px solid rgba(255,255,255,0.28)";
  }

  function clearBadges() {
    document.querySelectorAll(".ttwc-client-row-badge").forEach(el => el.remove());
  }

  function tick() {
    try {
      const inLobby = isCustomLobbyActive();
      const players = Array.isArray(TTWC.peace.players) ? TTWC.peace.players : [];

      if (!inLobby || players.length === 0) {
        clearBadges();
      } else {
        const rows = getActionRows();
        rows.forEach((rowInfo, index) => applyBadge(rowInfo, index));
      }
    } catch (e) {
      // ignore
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.peace = TTWC.peace || {};

  function installPeaceTracing() {
    try {
      if (!window.b8 || !window.b9 || !window.aw || !window.__fx) return false;
      if (!b8.hU || typeof b8.hU.hp !== "function") return false;
      if (!b8.pG || typeof b8.pG.hp !== "function") return false;
      if (!b9.qB || typeof b9.qB.qC !== "function") return false;
      if (!__fx.customLobby || typeof __fx.customLobby.isActive !== "function") return false;
      if (TTWC.peace.tracingInstalled) return true;

      TTWC.peace._origTrace_hUhp = b8.hU.hp;
      TTWC.peace._origTrace_pGhp = b8.pG.hp;
      TTWC.peace._origTrace_qC = b9.qB.qC;

      b8.hU.hp = function() {
        console.log("[TTWC TRACE] b8.hU.hp called", {
          customLobby: !!(__fx.customLobby && __fx.customLobby.isActive && __fx.customLobby.isActive()),
          aD_kj: typeof aD !== "undefined" ? aD.kj : undefined,
          self: typeof aD !== "undefined" ? aD.eo : undefined
        });
        return TTWC.peace._origTrace_hUhp.apply(this, arguments);
      };

      b8.pG.hp = function(player) {
  console.log("[TTWC TRACE] b8.pG.hp called", {
    player,
    self: typeof aD !== "undefined" ? aD.eo : undefined,
    forceHostPeaceOnce: !!TTWC.peace.forceHostPeaceOnce
  });

  return TTWC.peace._origTrace_pGhp.apply(this, arguments);
};
      b9.qB.qC = function() {
        const args = Array.from(arguments);
        if (args[0] === 5 && args[2] === 513) {
          console.log("[TTWC TRACE] qC peace action", {
            args,
            self: typeof aD !== "undefined" ? aD.eo : undefined
          });
        }
        return TTWC.peace._origTrace_qC.apply(this, arguments);
      };

      if (__fx.customLobby.send && typeof __fx.customLobby.send === "function") {
        TTWC.peace._origTrace_customSend = __fx.customLobby.send;
        __fx.customLobby.send = function() {
          console.log("[TTWC TRACE] __fx.customLobby.send called", {
            args: Array.from(arguments)
          });
          return TTWC.peace._origTrace_customSend.apply(this, arguments);
        };
      }

      TTWC.peace.tracingInstalled = true;
      console.log("[TTWC TRACE] peace tracing installed");
      return true;
    } catch (e) {
      console.log("[TTWC TRACE] installPeaceTracing error:", e);
      return false;
    }
  }

  const traceInterval = setInterval(() => {
    if (installPeaceTracing()) clearInterval(traceInterval);
  }, 500);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};

  TTWC.matchReport = TTWC.matchReport || {};
  TTWC.matchReport.sentForRound = false;
  TTWC.matchReport.lastSentAt = 0;
  TTWC.matchReport.lastPayloadHash = null;

  function getEndpoint() {
    try {
      return (
        TTWC.matchReport.endpoint ||
        localStorage.getItem("ttwc_match_report_endpoint") ||
        ""
      ).trim();
    } catch {
      return "";
    }
  }

  function getLobbyCode() {
    try {
      const hash = window.location.hash || "";
      const m = hash.match(/#lobby=([^&]+)/);
      return m ? m[1] : undefined;
    } catch {
      return undefined;
    }
  }

  function buildPayload() {
    try {
      const getter = window.__TTWC?.getLeaderboardSnapshot;

      if (typeof getter !== "function") {
        console.log("[TTWC] getLeaderboardSnapshot() is not available yet");
        return null;
      }

      const snapshot = getter();
      if (!Array.isArray(snapshot) || snapshot.length === 0) {
        console.log("[TTWC] leaderboard snapshot empty");
        return null;
      }

      const humanNameSet = new Set(
  Array.isArray(TTWC.humanNames)
    ? TTWC.humanNames.map(n => String(n).trim()).filter(Boolean)
    : []
);

const leaderboard = snapshot
  .map((p, index) => ({
    id: Number(p.id ?? p.playerId ?? index),
    name: String(p.name ?? p.displayName ?? `Player ${index + 1}`).trim(),
    territory: Number(p.territory ?? p.score ?? 0),
    troops: Number(p.troops ?? 0)
  }))
  .filter(row => row.name && !Number.isNaN(row.territory))
  .filter(row => humanNameSet.size === 0 || humanNameSet.has(row.name));
      
      if (leaderboard.length === 0) {
        console.log("[TTWC] no usable leaderboard rows");
        return null;
console.log("[TTWC] human names:", [...humanNameSet]);
console.log("[TTWC] filtered leaderboard:", leaderboard);
      }

      const meta = {
        title: "TTWC Custom Lobby Match Finished",
        endedAt: Date.now(),
        lobbyCode: getLobbyCode(),
        resultType: TTWC.resultType || undefined,
        mode: window.__fx?.customLobby?.gameInfo?.mode,
        map: window.__fx?.customLobby?.gameInfo?.map,
        botCount: window.__fx?.customLobby?.gameInfo?.botCount,
        matchId: `${Date.now()}-${getLobbyCode() || "nolobby"}`
      };

      return { meta, leaderboard };
    } catch (e) {
      console.log("[TTWC] buildPayload failed", e);
      return null;
    }
  }

  function makePayloadHash(payload) {
    try {
      return JSON.stringify({
        resultType: payload?.meta?.resultType,
        lobbyCode: payload?.meta?.lobbyCode,
        leaderboard: (payload?.leaderboard || []).map(p => [
          p.id,
          p.name,
          p.territory,
          p.troops
        ])
      });
    } catch {
      return null;
    }
  }

  async function postSnapshot(payload) {
  const url = getEndpoint();
  if (!url) {
    console.log("[TTWC] no endpoint set");
    return false;
  }

  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "content-type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    console.log("[TTWC] match report sent to Google Sheets");
    return true;
  } catch (e) {
    console.log("[TTWC] match report error", e);
    return false;
  }
}

  function resetForNextRound() {
  TTWC.matchReport.sentForRound = false;
  TTWC.matchReport.lastPayloadHash = null;
  TTWC.matchReport.lastSentAt = 0;
  TTWC.resultType = null;
  TTWC.endScreenShown = false;
}

  function isMainMenu() {
    try {
      return !!document.querySelector('input[placeholder*="Kingdom"]');
    } catch {
      return false;
    }
  }

  function shouldSendFromThisTab() {
  try {
    const hostInfo = {
      fxIsHost: window.__fx?.customLobby?.isHost,
      ttwcIsHost: window.__TTWC?.isHost,
      selfLobbyIndex: window.__TTWC?.selfLobbyIndex
    };

    console.log("[TTWC] host check:", hostInfo);

    if (window.__fx?.customLobby?.isHost === true) return true;
    if (window.__fx?.customLobby?.isHost === false) return false;

    if (window.__TTWC?.isHost === true) return true;
    if (window.__TTWC?.isHost === false) return false;

    if (typeof window.__TTWC?.selfLobbyIndex === "number") {
      return window.__TTWC.selfLobbyIndex === 0;
    }
  } catch (e) {
    console.log("[TTWC] shouldSendFromThisTab error", e);
  }

  return false;
}

  async function tick() {
    try {
      const hasFinished =
        TTWC.endScreenShown ||
        TTWC.resultType === "victory" ||
        TTWC.resultType === "stalemate";

      if (hasFinished && shouldSendFromThisTab() && !TTWC.matchReport.sentForRound) {
        const now = Date.now();

        if (now - (TTWC.matchReport.lastSentAt || 0) > 2000) {
          TTWC.matchReport.lastSentAt = now;

          const payload = buildPayload();
          if (payload) {
            const hash = makePayloadHash(payload);

            if (hash && hash === TTWC.matchReport.lastPayloadHash) {
              console.log("[TTWC] duplicate payload skipped");
            } else {
              const ok = await postSnapshot(payload);
              if (ok) {
                TTWC.matchReport.sentForRound = true;
                TTWC.matchReport.lastPayloadHash = hash;
              }
            }
          }
        }
      }

      if (isMainMenu() && TTWC.matchReport.sentForRound) {
        resetForNextRound();
      }
    } catch (e) {
      console.log("[TTWC] tick error", e);
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
