<script>
(() => {
  function findBtn(label) {
    return Array.from(document.querySelectorAll("button"))
      .find(b => (b.innerText || "").trim().includes(label));
  }

  // Stores target positions once we capture them
  const targets = {
    lobby: null,    // Join/Create should go here (Multiplayer slot)
    settings: null  // FX settings should go here (Custom Scenario slot)
  };

  function captureBox(btn) {
    const rect = btn.getBoundingClientRect();

    // Prefer inline style values if present (common in Territorial UI)
    const left = btn.style.left || (rect.left + "px");
    const top = btn.style.top || (rect.top + "px");
    const width = btn.style.width || (rect.width + "px");
    const height = btn.style.height || (rect.height + "px");
    const font = btn.style.font || getComputedStyle(btn).font;
    const border = btn.style.border || getComputedStyle(btn).border;
    const bg = btn.style.backgroundColor || getComputedStyle(btn).backgroundColor;

    return { left, top, width, height, font, border, bg };
  }

  function applyBox(to, box) {
    if (!to || !box) return;

    // Use !important so we always win
    to.style.setProperty("position", "absolute", "important");
    to.style.setProperty("left", box.left, "important");
    to.style.setProperty("top", box.top, "important");
    to.style.setProperty("width", box.width, "important");
    to.style.setProperty("height", box.height, "important");
    to.style.setProperty("font", box.font, "important");
    to.style.setProperty("border", box.border, "important");
    to.style.setProperty("background-color", box.bg, "important");
  }

  function isMenu() {
    // Same best-effort check as logo: menu exists if the kingdom-name input exists
    return !!document.querySelector('input[placeholder*="Kingdom"]');
  }

  function tick() {
    if (isMenu()) {
      const multiplayer = findBtn("Multiplayer");
      const scenario = findBtn("Custom Scenario");
      const lobby = findBtn("Join/Create custom lobby");
      const settings = findBtn("FX Client settings");

      // Capture big button boxes once
      if (!targets.lobby && multiplayer) targets.lobby = captureBox(multiplayer);
      if (!targets.settings && scenario) targets.settings = captureBox(scenario);

      // Remove unwanted buttons whenever they exist
      if (multiplayer) multiplayer.remove();
      if (scenario) scenario.remove();

      // Move & lock the two remaining buttons into the captured slots
      applyBox(lobby, targets.lobby);
      applyBox(settings, targets.settings);
    }

    requestAnimationFrame(tick);
  }

  console.log("[TTWC] menu button swap active");
  requestAnimationFrame(tick);
})();

  <script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.humanNames = [];
  TTWC.anonMap = new Map();
  TTWC.endScreenShown = false;
  TTWC.roundSeeded = false;
  TTWC.lastRoundMarker = "";
  TTWC.autoClickDone = false;

  function onMainMenu() {
    const el = document.querySelector('input[placeholder*="Kingdom"]');
    if (!el) return false;
    const style = getComputedStyle(el);
    if (style.display === "none" || style.visibility === "hidden" || style.opacity === "0") return false;
    const rect = el.getBoundingClientRect();
    return rect.width > 0 && rect.height > 0;
  }

  function getAnon(realName) {
    if (!TTWC.anonMap.has(realName)) {
      TTWC.anonMap.set(realName, "Anon " + Math.floor(1000 + Math.random() * 9000));
    }
    return TTWC.anonMap.get(realName);
  }

  function resetRound() {
    TTWC.humanNames = [];
    TTWC.anonMap.clear();
    TTWC.endScreenShown = false;
    TTWC.roundSeeded = false;
    TTWC.autoClickDone = false;
  }

  function shouldAnonymise() {
    if (onMainMenu()) {
      resetRound();
      return false;
    }
    if (TTWC.endScreenShown) return false;
    return TTWC.humanNames.length > 0;
  }

  function replaceExactNames(text) {
    let out = text;
    const sorted = [...TTWC.humanNames].sort((a, b) => b.length - a.length);

    for (const realName of sorted) {
      const anon = getAnon(realName);

      if (out.includes(realName)) {
        out = out.split(realName).join(anon);
      }

      if (realName.length > 4) {
        const trunc3 = realName.slice(0, Math.max(1, realName.length - 3)) + "...";
        const trunc1 = realName.slice(0, Math.max(1, realName.length - 1)) + "…";

        if (out.includes(trunc3)) out = out.split(trunc3).join(anon);
        if (out.includes(trunc1)) out = out.split(trunc1).join(anon);
      }
    }

    return out;
  }

  function patchPlayerList() {
    const pl = window.__fx?.playerList;
    if (!pl || pl.__ttwcPatched) return;

    const originalDisplay = pl.display;

    pl.display = function(names) {
      const result = originalDisplay.apply(this, arguments);

      try {
        const listRoot = document.getElementById("playerlist");
        const text = listRoot?.innerText || "";
        const match = text.match(/Players\s*\((\d+)\)/i);

        if (Array.isArray(names) && match) {
          const humanCount = parseInt(match[1], 10);
          TTWC.humanNames = names.slice(0, humanCount);
          TTWC.roundSeeded = true;

          // close the list immediately so users don't see it pop up
          try {
            window.__fx?.WindowManager?.closeWindow?.("playerList");
          } catch {}
        }
      } catch {}

      return result;
    };

    pl.__ttwcPatched = true;
    console.log("[TTWC] playerList hook installed");
  }

  const originalFillText = CanvasRenderingContext2D.prototype.fillText;
  const originalDrawImage = CanvasRenderingContext2D.prototype.drawImage;

  CanvasRenderingContext2D.prototype.drawImage = function(...args) {
    try {
      const img = args[0];
      const defeatImg = window.ab?.aHK?.("defeat");
      const victoryImg = window.ab?.aHK?.("victory");

      if (img && (img === defeatImg || img === victoryImg)) {
        TTWC.endScreenShown = true;
      }
    } catch {}

    return originalDrawImage.apply(this, args);
  };

  CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
    try {
      if (typeof text === "string") {
        if (text.includes("Choose your start position!")) {
          if (TTWC.lastRoundMarker !== "spawn") {
            resetRound();
            TTWC.lastRoundMarker = "spawn";
          }
        }

        if (shouldAnonymise()) {
          text = replaceExactNames(text);
        }
      }
    } catch {}

    return originalFillText.call(this, text, x, y, maxWidth);
  };

  const hookTimer = setInterval(() => {
    patchPlayerList();

    // Never try anything on menu / lobby
    if (!onMainMenu() && TTWC.lastRoundMarker === "spawn" && !TTWC.roundSeeded) {
      // Wait for one manual or automatic player-list display hook only during round start
    }
  }, 500);

  console.log("[TTWC] auto-seeding player-list anonymiser active");
})();

  <script>
(() => {
  // 1) Add logo once
  function ensureLogo() {
    if (document.getElementById("ttwcLogo")) return;
    const img = document.createElement("img");
    img.id = "ttwcLogo";
    img.src = "./assets/ttwc-logo.png";
    img.alt = "TTWC";
    document.body.appendChild(img);
  }

  const TEXT = {
    multiplayer: "Multiplayer",
    scenario: "Custom Scenario",
    settings: "FX Client settings",
    lobby: "Join/Create custom lobby"
  };

  const targets = { lobbyBox: null, settingsBox: null };

  function buttons() {
    return Array.from(document.querySelectorAll("button"));
  }

  function findBtn(label) {
    return buttons().find(b => (b.textContent || "").includes(label));
  }

  function allMatching(label) {
    return buttons().filter(b => (b.textContent || "").includes(label));
  }

  function captureBox(btn) {
    const r = btn.getBoundingClientRect();
    return {
      left: r.left + "px",
      top: r.top + "px",
      width: r.width + "px",
      height: r.height + "px",
      font: getComputedStyle(btn).font,
      border: getComputedStyle(btn).border,
      bg: getComputedStyle(btn).backgroundColor
    };
  }

  function applyBox(btn, box) {
    if (!btn || !box) return;
    btn.style.setProperty("position", "absolute", "important");
    btn.style.setProperty("left", box.left, "important");
    btn.style.setProperty("top", box.top, "important");
    btn.style.setProperty("width", box.width, "important");
    btn.style.setProperty("height", box.height, "important");
    btn.style.setProperty("font", box.font, "important");
    btn.style.setProperty("border", box.border, "important");
    btn.style.setProperty("background-color", box.bg, "important");
    btn.style.setProperty("margin", "0", "important");
  }

  function hide(btn) {
    if (!btn) return;
    btn.style.setProperty("display", "none", "important");
    btn.style.setProperty("pointer-events", "none", "important");
  }

  // Best effort “are we on main menu”
  function isMenu() {
    // Many builds still expose MenuManager; if not, we still run safely.
    try { return window.MenuManager?.getState?.() === 6; } catch { return true; }
  }

  function apply() {
    ensureLogo();

    if (!isMenu()) {
      // Hide logo outside menu (stops it lingering in other screens)
      const logo = document.getElementById("ttwcLogo");
      if (logo) logo.style.display = "none";
      document.body.classList.add("ttwc-ready");
      return;
    } else {
      const logo = document.getElementById("ttwcLogo");
      if (logo) logo.style.display = "";
    }

    const mp = findBtn(TEXT.multiplayer);
    const sc = findBtn(TEXT.scenario);
    const lobby = findBtn(TEXT.lobby);
    const settings = findBtn(TEXT.settings);

    if (!targets.lobbyBox && mp) targets.lobbyBox = captureBox(mp);
    if (!targets.settingsBox && sc) targets.settingsBox = captureBox(sc);

    // Hide unwanted buttons (don’t remove)
    allMatching(TEXT.multiplayer).forEach(hide);
    allMatching(TEXT.scenario).forEach(hide);

    // Move these into the big slots
    applyBox(lobby, targets.lobbyBox);
    applyBox(settings, targets.settingsBox);

    // Done — reveal buttons now that layout is correct
    document.body.classList.add("ttwc-ready");
  }

  // Run now + keep winning when UI rebuilds
  apply();
  new MutationObserver(() => requestAnimationFrame(apply))
    .observe(document.body, { childList: true, subtree: true });

  // Extra retries in case buttons appear slightly later
  let n = 0;
  const t = setInterval(() => {
    apply();
    if (++n > 40) clearInterval(t);
  }, 100);

  console.log("[TTWC] menu + logo script active");
})();
</script>

          if (!window.__TTWC.peaceVoteHostOnly) {
            return originalWrapperPeace.apply(this, arguments);
          }

          if (peaceVoteActive()) {
            return originalWrapperPeace.apply(this, arguments);
          }

          if (!window.__TTWC.isHost) {
            console.log("TTWC: non-host direct peace start blocked");
            return;
          }

          if (isAlive()) {
            console.log("TTWC: alive host wrapper peace allowed");
            return originalWrapperPeace.apply(this, arguments);
          }

          return callDeadHostGameplayPeace();
        } catch (e) {
          console.log("TTWC b8.hU.hp patch error:", e);
        }
      };

      /*
        Block non-host UI clicks before a peace vote exists.
      */
      document.addEventListener(
        "click",
        function (e) {
          try {
            if (!window.__TTWC.peaceVoteHostOnly) return;
            if (peaceVoteActive()) return;
            if (window.__TTWC.isHost) return;

            const target = e.target && e.target.closest ? e.target.closest("button, div, span, p") : null;
            if (!target) return;

            const text = (target.textContent || "").trim();
            if (text.includes("Call Peace Vote") || text.includes("🕊️")) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              console.log("TTWC: non-host peace UI click blocked");
            }
          } catch (err) {
            console.log("TTWC peace UI click block error:", err);
          }
        },
        true
      );

      /*
        Hide peace button for non-hosts when no peace vote is active.
      */
      const hidePeaceButtons = function () {
        try {
          if (window.__TTWC.isHost) return;
          if (peaceVoteActive()) return;

          const nodes = document.querySelectorAll("button, div, span, p");
          nodes.forEach(function (node) {
            const text = (node.textContent || "").trim();
            if (text === "🕊️ Call Peace Vote" || text === "Call Peace Vote") {
              node.style.display = "none";
            }
          });
        } catch (e) {
          console.log("TTWC peace UI hide error:", e);
        }
      };

      const observer = new MutationObserver(hidePeaceButtons);
      observer.observe(document.body, { childList: true, subtree: true });
      setInterval(hidePeaceButtons, 1000);

      window.__TTWC._peacePatched = true;
      console.log("TTWC: host-only peace patch loaded");
      return true;
    } catch (e) {
      console.log("TTWC patchPeaceControl error:", e);
      return false;
    }
  }

  const interval = setInterval(function () {
    const ok1 = patchHostTracking();
    const ok2 = patchPeaceControl();

    if (ok1 && ok2) {
      clearInterval(interval);
      console.log("TTWC: all peace patches installed");
    }
  }, 500);
})();
</script>
