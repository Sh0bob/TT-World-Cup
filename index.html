/* ===== TTWC GAME MENU RESKIN ===== */

/* Main dark menu panels created at runtime */
div[style*="position: absolute"][style*="background-color: rgba(0, 0, 0, 0.85)"] {
  background: rgba(6, 12, 18, 0.78) !important;
  backdrop-filter: blur(10px) saturate(120%);
  -webkit-backdrop-filter: blur(10px) saturate(120%);
  border-color: rgba(220, 235, 245, 0.65) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.10),
    0 10px 30px rgba(0,0,0,0.30) !important;
}

/* Any runtime grid used by the menu */
div[style*="display: grid"][style*="grid-template-columns"] {
  gap: 18px !important;
  padding: 20px !important;
}

/* Game menu tiles */
div[style*="display: grid"][style*="grid-template-columns"] > button {
  background:
    radial-gradient(120% 90% at 10% 0%, rgba(255,255,255,0.10), transparent 40%),
    linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03) 34%, rgba(0,0,0,0.12) 100%),
    linear-gradient(180deg, rgba(40,55,66,0.68), rgba(12,18,24,0.82)) !important;
  border: 1px solid rgba(225, 235, 243, 0.35) !important;
  border-radius: 16px !important;
  color: #f5fbff !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.28),
    0 8px 20px rgba(0,0,0,0.22) !important;
  transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease !important;
}

/* Hover */
div[style*="display: grid"][style*="grid-template-columns"] > button:hover {
  filter: brightness(1.06);
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.14),
    inset 0 -1px 0 rgba(0,0,0,0.28),
    0 10px 24px rgba(0,0,0,0.28) !important;
}

/* Pressed */
div[style*="display: grid"][style*="grid-template-columns"] > button:active {
  transform: translateY(2px) scale(0.99);
  filter: brightness(0.95);
}

/* Selected/active tile */
div[style*="display: grid"][style*="grid-template-columns"] > button[style*="rgb(95, 95, 95)"] {
  background:
    radial-gradient(120% 90% at 10% 0%, rgba(255,255,255,0.14), transparent 40%),
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04) 34%, rgba(0,0,0,0.10) 100%),
    linear-gradient(180deg, rgba(70,88,100,0.74), rgba(24,34,42,0.88)) !important;
}

/* Header and footer bars */
div[style*="display: flex"][style*="height: 165px"] {
  background: rgba(5, 10, 16, 0.82) !important;
  border-color: rgba(220,235,245,0.35) !important;
}

/* TTWC game menu header */
div[style*="position: absolute"][style*="top: 0px"][style*="width: 100%"][style*="height: 165px"] {
  background: rgba(5, 10, 16, 0.82) !important;
  backdrop-filter: blur(10px) saturate(120%);
  -webkit-backdrop-filter: blur(10px) saturate(120%);
  border-bottom: 1px solid rgba(220, 235, 245, 0.35) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 8px 24px rgba(0,0,0,0.22) !important;
}

/* Safer footer selector */
div[style*="position: absolute"][style*="white-space: nowrap"][style*="border-top: 3.6px solid rgb(255, 255, 255)"] {
  background: rgba(5, 10, 16, 0.82) !important;
  backdrop-filter: blur(10px) saturate(120%);
  -webkit-backdrop-filter: blur(10px) saturate(120%);
  border-top: 1px solid rgba(220, 235, 245, 0.35) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 -8px 24px rgba(0,0,0,0.18) !important;
}

/* TTWC game menu back button */
div[style*="white-space: nowrap"] > button {
  background:
    radial-gradient(120% 90% at 10% 0%, rgba(255,255,255,0.10), transparent 40%),
    linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03) 34%, rgba(0,0,0,0.12) 100%),
    linear-gradient(180deg, rgba(40,55,66,0.68), rgba(12,18,24,0.82)) !important;
  border: 1px solid rgba(225, 235, 243, 0.35) !important;
  border-radius: 16px !important;
  color: #f5fbff !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.28),
    0 8px 20px rgba(0,0,0,0.22) !important;
  transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease !important;
}

div[style*="white-space: nowrap"] > button:hover {

}

    const pressOff = () => btn.classList.remove("ttwc-pressed");

    btn.addEventListener("pointerdown", pressOn);
    btn.addEventListener("pointerup", pressOff);

    btn.addEventListener("blur", pressOff);

  function tickBindMenuButtons() {
    document.querySelectorAll("button.ttwc-menu-btn").forEach(bindPressAnimation);

    let out = text;

    for (const realName of sorted) {
      const anon = getAnon(realName);

      if (out.includes(realName)) {
        out = out.split(realName).join(anon);

      if (realName.length > 4) {
        const trunc3 = realName.slice(0, Math.max(1, realName.length - 3)) + "...";
        const trunc1 = realName.slice(0, Math.max(1, realName.length - 1)) + "…";

<script>
(() => {
  function isVisible(el) {
    if (!el) return false;
    const r = el.getBoundingClientRect();
    const s = getComputedStyle(el);
    return r.width > 0 && r.height > 0 && s.display !== "none" && s.visibility !== "hidden";
  }

  function buttons() {
    return Array.from(document.querySelectorAll("button"));
  }

  function distanceToRectCenter(el, rect) {
    const r = el.getBoundingClientRect();
    const cx1 = r.left + r.width / 2;
    const cy1 = r.top + r.height / 2;
    const cx2 = rect.left + rect.width / 2;
    const cy2 = rect.top + rect.height / 2;
    const dx = cx1 - cx2;
    const dy = cy1 - cy2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function nearbyButtons(anchorRect, maxDistance = 420) {
    return buttons().filter(b => {
      const r = b.getBoundingClientRect();
      return r.width > 20 && r.height > 20 && distanceToRectCenter(b, anchorRect) < maxDistance;
    });
  }

  function findNearbyButton(anchorRect, text) {
    const t = text.toLowerCase();
    return nearbyButtons(anchorRect)
      .filter(b => (b.textContent || "").toLowerCase().includes(t))
      .sort((a, b) => distanceToRectCenter(a, anchorRect) - distanceToRectCenter(b, anchorRect))[0];
  }

  function findNearbyColorButton(anchorRect, exclude = []) {
    return nearbyButtons(anchorRect)
      .filter(b => {
        if (exclude.includes(b)) return false;
        const r = b.getBoundingClientRect();
        return !(b.textContent || "").trim() && r.width >= 28 && r.height >= 28 && r.width <= 90 && r.height <= 90;
      })
      .sort((a, b) => distanceToRectCenter(a, anchorRect) - distanceToRectCenter(b, anchorRect))[0];
  }

  function findPanelButton(anchorRect, exclude = []) {
    return nearbyButtons(anchorRect, 520)
      .filter(b => !exclude.includes(b))
      .filter(b => {
        const r = b.getBoundingClientRect();
        return r.width > 250 && r.height > 180;
      })
      .sort((a, b) => {
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        return (br.width * br.height) - (ar.width * ar.height);
      })[0];
  }

  function setButtonCopy(btn, title, subtitle, extraClass) {
    if (!btn) return;
    btn.classList.add("ttwc-menu-btn", extraClass);

    const html = `
      <span class="ttwc-btn-copy">
        <span class="ttwc-btn-title">${title}</span>
      </span>
    `;

    if (btn.dataset.ttwcHtml !== html) {
      btn.innerHTML = html;
      btn.dataset.ttwcHtml = html;
    }
  }

  function applyMenuSkin() {
    const kingdomInput = document.querySelector('input[placeholder*="Kingdom"]');
    if (!isVisible(kingdomInput)) {
  return;
}

    document.body.classList.add("ttwc-ui-reskin");

    const inputRect = kingdomInput.getBoundingClientRect();

    const lobbyBtn = findNearbyButton(inputRect, "join/create custom lobby");
    const settingsBtn = findNearbyButton(inputRect, "TTWC client settings");
    const menuBtn = findNearbyButton(inputRect, "game menu");
    const colorBtn = findNearbyColorButton(inputRect, [lobbyBtn, settingsBtn, menuBtn]);
    const panelBtn = findPanelButton(inputRect, [lobbyBtn, settingsBtn, menuBtn, colorBtn]);

    if (panelBtn) {
      panelBtn.classList.add("ttwc-panel-btn");
      panelBtn.innerHTML = "";
      panelBtn.textContent = "";
    }

    if (lobbyBtn) {
      setButtonCopy(
        lobbyBtn,
        "JOIN / CREATE LOBBY",
        "Access existing lobbies or create a new session",
        "ttwc-lobby"
      );
    }

    if (settingsBtn) {
      setButtonCopy(
        settingsBtn,
        "TTWC CLIENT SETTINGS",
        "Adjust visuals, effects, and performance",
        "ttwc-settings"
      );
    }

    if (menuBtn) {
      setButtonCopy(
        menuBtn,
        "GAME MENU",
        "General settings, credits, and exit game",
        "ttwc-menu"
      );
    }

    kingdomInput.classList.add("ttwc-name-input");
    if (colorBtn) colorBtn.classList.add("ttwc-color-btn");

  }

  function refreshMenuSkin() {
    requestAnimationFrame(applyMenuSkin);
    setTimeout(applyMenuSkin, 80);
    setTimeout(applyMenuSkin, 180);
  }

  refreshMenuSkin();

  new MutationObserver(() => refreshMenuSkin())
    .observe(document.body, { childList: true, subtree: true });

  window.addEventListener("resize", refreshMenuSkin);
  window.addEventListener("fullscreenchange", refreshMenuSkin);
})();

  }

      return !!(
        window.__fx &&
        __fx.customLobby &&

  function normalizePlayerName(name) {
    return String(name || "").trim();
  }

  function getPlayerNameKey(name) {
    const normalized = normalizePlayerName(name);
    if (!normalized) return "";
    return normalized.toLowerCase();
  }

  function getUniquePlayerIndexByName(players, rawName) {
    const targetKey = getPlayerNameKey(rawName);
    if (!targetKey) return -1;
    let found = -1;
    let hits = 0;
    for (let i = 0; i < players.length; i++) {
      const playerKey = getPlayerNameKey(players[i]?.name);
      if (playerKey !== targetKey) continue;
      found = i;
      hits++;
      if (hits > 1) return -1; // ambiguous duplicate name
    }
    return hits === 1 ? found : -1;
  }

  function rebuildClientIndexMap() {
    const players = Array.isArray(TTWC.peace.players) ? TTWC.peace.players : [];

    for (let i = 0; i < players.length; i++) {
      const player = players[i];
      let label = TTWC.client.byIndex[i];
      if (!label) {
        const nameKey = getPlayerNameKey(player?.name);
        const uniqueIndex = getUniquePlayerIndexByName(players, player?.name);
        if (nameKey && uniqueIndex === i) {
          label = TTWC.client.byName[nameKey];

      return false;
    }
  }

  function shouldSendFromThisTab() {
  try {
    const hostInfo = {
      fxIsHost: window.__fx?.customLobby?.isHost,
      ttwcIsHost: window.__TTWC?.isHost,
      selfLobbyIndex: window.__TTWC?.selfLobbyIndex
    };

    console.log("[TTWC] host check:", hostInfo);

    if (window.__fx?.customLobby?.isHost === true) return true;
    if (window.__fx?.customLobby?.isHost === false) return false;

    if (window.__TTWC?.isHost === true) return true;
    if (window.__TTWC?.isHost === false) return false;

    if (typeof window.__TTWC?.selfLobbyIndex === "number") {
      return window.__TTWC.selfLobbyIndex === 0;
    }
  } catch (e) {
    console.log("[TTWC] shouldSendFromThisTab error", e);
  }

  return false;
}

  async function tick() {
    try {
      const hasFinished =
        TTWC.endScreenShown ||
        TTWC.resultType === "victory" ||
        TTWC.resultType === "stalemate";

      if (hasFinished && shouldSendFromThisTab() && !TTWC.matchReport.sentForRound) {
        const now = Date.now();

        if (now - (TTWC.matchReport.lastSentAt || 0) > 2000) {
          TTWC.matchReport.lastSentAt = now;

          const payload = buildPayload();
          if (payload) {
            const hash = makePayloadHash(payload);

            if (hash && hash === TTWC.matchReport.lastPayloadHash) {
              console.log("[TTWC] duplicate payload skipped");
            } else {
              const ok = await postSnapshot(payload);
              if (ok) {
                TTWC.matchReport.sentForRound = true;
                TTWC.matchReport.lastPayloadHash = hash;
              }
            }
          }
        }
      }

      if (isMainMenu() && TTWC.matchReport.sentForRound) {
        resetForNextRound();
      }
    } catch (e) {
      console.log("[TTWC] tick error", e);
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

<script>
/*
  TTWC CLIENT DETECTION - NO SERVER VERSION V2

  Fixes:
  - More reliable invisible TTWC marker injection before lobby join/create.
  - Does not use Cloudflare.
  - Does not use BroadcastChannel.
  - Does not use visible [TTWC] or [TT] text.
  - Keeps Host/Kick button badge placement for host view.
  - Adds canvas fallback badges so non-host players can also see TTWC/Other.
*/

(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.peace = TTWC.peace || {};
  TTWC.client = TTWC.client || {};
  TTWC.client.byIndex = TTWC.client.byIndex || {};
  TTWC.client.byName = TTWC.client.byName || {};
  TTWC.badges = TTWC.badges || {};

  /*
    Invisible signature.
    Do not replace this with visible [TTWC] text.
  */
  const MARKER = "\u2060\u200B\u200C\u200D\u2060\u200D\u200C\u200B\u2060";

  TTWC.CLIENT_MARKER = MARKER;

  function hasMarker(value) {
    return String(value || "").includes(MARKER);
  }

  function stripMarker(value) {
    return String(value || "").split(MARKER).join("");
  }

  function addMarker(value) {
    const clean = stripMarker(value || "");
    if (!clean.trim()) return clean;
    return clean + MARKER;
  }

  TTWC.hasClientMarker = hasMarker;
  TTWC.stripClientMarker = stripMarker;
  TTWC.addClientMarker = addMarker;

  function isCustomLobbyActive() {
    try {
      return !!(
        window.__fx &&
        __fx.customLobby &&
        typeof __fx.customLobby.isActive === "function" &&
        __fx.customLobby.isActive()
      );
    } catch {
      return false;
    }
  }

  function getPlayers() {
    return Array.isArray(TTWC.peace.players) ? TTWC.peace.players : [];
  }

  function cleanName(name) {
    return stripMarker(name)
      .replace(/\[TTWC\]/gi, "")
      .replace(/\[TT\]/gi, "")
      .trim();
  }

  function getNameKey(name) {
    return cleanName(name).toLowerCase();
  }

  function getNameInput() {
    return document.querySelector('input[placeholder*="Kingdom"]');
  }

  function markPlayerAsTTWC(index) {
    const players = getPlayers();
    const player = players[index];

    TTWC.client.byIndex[index] = "TTWC";

    if (player) {
      player.client = "TTWC";

      const key = getNameKey(player.name);
      if (key) {
        TTWC.client.byName[key] = "TTWC";
      }
    }
  }

  /*
    Temporarily ensure the visible name input has the invisible marker
    before lobby join/create. It is invisible, and we do not use [TTWC].
  */
  function ensureInputHasMarker() {
    // Display-only mode: do not mutate name input or outbound identity data.
    return false;
  }

  /*
    During lobby joining, keep the marker attached for a short window.
    This catches delayed FX reads of the name value.
  */
  function boostMarkerForJoinWindow() {}

  function patchNameFieldsDeep(value, depth = 0) {
    if (!value || depth > 10) return value;

    if (Array.isArray(value)) {
      for (let i = 0; i < value.length; i++) {
        value[i] = patchNameFieldsDeep(value[i], depth + 1);
      }
      return value;
    }

    if (typeof value === "object") {
      for (const key of Object.keys(value)) {
        const lower = key.toLowerCase();

        const looksLikeNameField =
          lower === "name" ||
          lower === "playername" ||
          lower === "username" ||
          lower === "nickname" ||
          lower === "nick" ||
          lower === "kingdom" ||
          lower === "kingdomname";

        if (looksLikeNameField && typeof value[key] === "string") {
          const clean = stripMarker(value[key]);

          if (clean.trim() && clean.length <= 60) {
            value[key] = addMarker(clean);
          }
        } else {
          value[key] = patchNameFieldsDeep(value[key], depth + 1);
        }
      }
    }

    return value;
  }

  function patchCustomLobbyPacket(packet) {
    try {
      const bytes =
        packet instanceof Uint8Array
          ? packet
          : packet instanceof ArrayBuffer
            ? new Uint8Array(packet)
            : ArrayBuffer.isView(packet)
              ? new Uint8Array(packet.buffer, packet.byteOffset, packet.byteLength)
              : null;

      if (!bytes || !bytes.length) return packet;

      /*
        FX custom lobby messages normally start with byte 120, followed by JSON.
      */
      if (bytes[0] !== 120) return packet;

      const text = new TextDecoder().decode(bytes.subarray(1));
      if (!text || (text[0] !== "{" && text[0] !== "[")) return packet;

      const msg = JSON.parse(text);
      patchNameFieldsDeep(msg);

      const payload = new TextEncoder().encode(JSON.stringify(msg));
      const out = new Uint8Array(payload.length + 1);
      out[0] = 120;
      out.set(payload, 1);

      return out.buffer;
    } catch {
      return packet;
    }
  }

  function patchSenders() {
    // Intentionally disabled.
    // The stable client-identification path is the custom-lobby clientInfo/clientRoster
    // flow implemented earlier in this file. Packet mutation here caused desync.
  }

  /*
    Join/create hooks.
  */
  document.addEventListener("pointerdown", function(e) {
    if (e.target && e.target.closest && e.target.closest("#createLobbyButton")) {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }
  }, true);

  document.addEventListener("mousedown", function(e) {
    if (e.target && e.target.closest && e.target.closest("#createLobbyButton")) {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }
  }, true);

  document.addEventListener("click", function(e) {
    if (e.target && e.target.closest && e.target.closest("#createLobbyButton")) {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }
  }, true);

  document.addEventListener("input", function(e) {
    if (e.target && e.target.id === "lobbyCode") {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }
  }, true);

  document.addEventListener("keydown", function(e) {
    if (e.target && e.target.id === "lobbyCode") {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }

    if (e.key === "Enter") {
      ensureInputHasMarker();
      boostMarkerForJoinWindow();
    }
  }, true);

  function patchIncomingPlayers() {
    const players = getPlayers();

    for (let i = 0; i < players.length; i++) {
      const player = players[i];
      if (!player) continue;

      if (hasMarker(player.name)) {
        markPlayerAsTTWC(i);
      }

      player.cleanName = cleanName(player.name);
    }
  }

  function getClientLabel(index) {
    const players = getPlayers();
    const player = players[index] || null;

    const isSelf =
      typeof TTWC.peace.selfLobbyIndex === "number" &&
      TTWC.peace.selfLobbyIndex === index;

    if (isSelf) {
      markPlayerAsTTWC(index);
      return "TTWC";
    }

    if (player && hasMarker(player.name)) {
      markPlayerAsTTWC(index);
      return "TTWC";
    }

    const key = getNameKey(player?.name);

    if (key && TTWC.client.byName[key] === "TTWC") {
      markPlayerAsTTWC(index);
      return "TTWC";
    }

    const rawLabel =
      (player && player.client) ||
      TTWC.client?.byIndex?.[index] ||
      "Other";

    return rawLabel === "TTWC" ? "TTWC" : "Other";
  }

  function makeBadgeElement(label) {
    const badge = document.createElement("span");
    badge.className = "ttwc-client-row-badge";
    badge.textContent = label;

    Object.assign(badge.style, {
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      minWidth: "52px",
      height: "22px",
      padding: "0 8px",
      marginRight: "6px",
      borderRadius: "999px",
      fontSize: "11px",
      fontWeight: "800",
      fontFamily: "Arial, Helvetica, sans-serif",
      letterSpacing: "0.2px",
      color: "#fff",
      verticalAlign: "middle",
      boxSizing: "border-box",
      position: "static",
      transform: "none",
      pointerEvents: "none",
      whiteSpace: "nowrap"
    });

    if (label === "TTWC") {
      Object.assign(badge.style, {
        background: "rgba(22, 101, 52, 0.85)",
        border: "1px solid rgba(74, 222, 128, 0.85)",
        boxShadow: "0 0 8px rgba(34, 197, 94, 0.25)"
      });
    } else {
      Object.assign(badge.style, {
        background: "rgba(55, 65, 81, 0.85)",
        border: "1px solid rgba(156, 163, 175, 0.65)",
        boxShadow: "none"
      });
    }

    return badge;
  }

  function getActionRows() {
    const actionButtons = Array.from(document.querySelectorAll("button"))
      .filter(btn => {
        const text = (btn.textContent || "").trim().toLowerCase();
        return text === "host" || text === "kick";
      })
      .filter(btn => {
        const rect = btn.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
      });

    const rowMap = new Map();

    for (const btn of actionButtons) {
      const row = btn.parentElement;
      if (!row) continue;

      if (!rowMap.has(row)) {
        rowMap.set(row, {
          row,
          buttons: []
        });
      }

      rowMap.get(row).buttons.push(btn);
    }

    return Array.from(rowMap.values())
      .sort((a, b) => {
        const ar = a.row.getBoundingClientRect();
        const br = b.row.getBoundingClientRect();

        if (Math.abs(ar.top - br.top) > 3) {
          return ar.top - br.top;
        }

        return ar.left - br.left;
      });
  }

  function removeOldDomBadges() {
    document.querySelectorAll(".ttwc-client-row-badge").forEach(el => el.remove());
  }

  function applyDomBadge(rowInfo, index) {
    const row = rowInfo?.row;
    if (!row) return;

    const label = getClientLabel(index);
    const badge = makeBadgeElement(label);

    const anchor = rowInfo.buttons
      .slice()
      .sort((a, b) => a.getBoundingClientRect().left - b.getBoundingClientRect().left)[0];

    if (anchor && anchor.parentNode) {
      anchor.parentNode.insertBefore(badge, anchor);
    } else {
      row.appendChild(badge);
    }
  }

  function injectDomBadges() {
    try {
      if (!isCustomLobbyActive()) {
        removeOldDomBadges();
        TTWC.badges.domCoversAllPlayers = false;
        return;
      }

      const players = getPlayers();
      const rows = getActionRows();

      if (!players.length || !rows.length) {
        removeOldDomBadges();
        TTWC.badges.domCoversAllPlayers = false;
        return;
      }

      removeOldDomBadges();

      const count = Math.min(players.length, rows.length);

      for (let i = 0; i < count; i++) {
        applyDomBadge(rows[i], i);
      }

      /*
        Host usually has Host/Kick anchors for all players.
        Non-host usually does not, so canvas fallback handles non-host view.
      */
      TTWC.badges.domCoversAllPlayers = rows.length >= players.length;
    } catch (e) {
      console.log("[TTWC CLIENT] DOM badge inject error:", e);
    }
  }

  function drawCanvasBadge(ctx, x, y, label) {
    try {
      const scale = Math.max(1, Math.min(1.4, (parseFloat(ctx.font) || 16) / 16));
      const w = label === "TTWC" ? 45 * scale : 43 * scale;
      const h = 17 * scale;
      const r = h / 2;

      const bx = x;
      const by = y - h + 3;

      ctx.save();

      ctx.font = `${Math.round(10 * scale)}px Arial`;
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";

      ctx.beginPath();
      ctx.moveTo(bx + r, by);
      ctx.lineTo(bx + w - r, by);
      ctx.quadraticCurveTo(bx + w, by, bx + w, by + r);
      ctx.lineTo(bx + w, by + h - r);
      ctx.quadraticCurveTo(bx + w, by + h, bx + w - r, by + h);
      ctx.lineTo(bx + r, by + h);
      ctx.quadraticCurveTo(bx, by + h, bx, by + h - r);
      ctx.lineTo(bx, by + r);
      ctx.quadraticCurveTo(bx, by, bx + r, by);
      ctx.closePath();

      if (label === "TTWC") {
        ctx.fillStyle = "rgba(22, 101, 52, 0.90)";
        ctx.strokeStyle = "rgba(74, 222, 128, 0.90)";
      } else {
        ctx.fillStyle = "rgba(55, 65, 81, 0.90)";
        ctx.strokeStyle = "rgba(156, 163, 175, 0.75)";
      }

      ctx.lineWidth = 1;
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.fillText(label, bx + w / 2, by + h / 2 + 0.5);

      ctx.restore();
    } catch {}
  }

  function findPlayerIndexForDrawnText(text) {
    const players = getPlayers();
    const drawn = cleanName(text);

    if (!drawn) return -1;

    /*
      Exact match first.
    */
    for (let i = 0; i < players.length; i++) {
      if (cleanName(players[i]?.name) === drawn) return i;
    }

    /*
      Many lobby names wrap over multiple lines, e.g.
      "[USA]" then "Player 41".
      Use endsWith so badge appears beside the final line.
    */
    for (let i = 0; i < players.length; i++) {
      const full = cleanName(players[i]?.name);
      if (!full) continue;

      if (full.endsWith(drawn) && drawn.length >= 3) {
        return i;
      }
    }

    return -1;
  }

  function patchCanvasBadges() {
    try {
      if (CanvasRenderingContext2D.prototype.__ttwcCanvasBadgesPatchedV2) return;

      const originalFillText = CanvasRenderingContext2D.prototype.fillText;
      const originalStrokeText = CanvasRenderingContext2D.prototype.strokeText;

      CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
        let cleanText = text;

        try {
          if (typeof cleanText === "string") {
            cleanText = stripMarker(cleanText);
          }
        } catch {}

        const result = arguments.length >= 4
          ? originalFillText.call(this, cleanText, x, y, maxWidth)
          : originalFillText.call(this, cleanText, x, y);

        try {
          if (
            isCustomLobbyActive() &&
            !TTWC.badges.domCoversAllPlayers &&
            typeof cleanText === "string"
          ) {
            const index = findPlayerIndexForDrawnText(cleanText);

            if (index >= 0) {
              const label = getClientLabel(index);
              const width = this.measureText(cleanText).width || 0;

              /*
                Put badge beside the drawn name fragment.
              */
              drawCanvasBadge(this, x + width + 8, y, label);
            }
          }
        } catch {}

        return result;
      };

      CanvasRenderingContext2D.prototype.strokeText = function(text, x, y, maxWidth) {
        let cleanText = text;

        try {
          if (typeof cleanText === "string") {
            cleanText = stripMarker(cleanText);
          }
        } catch {}

        const result = arguments.length >= 4
          ? originalStrokeText.call(this, cleanText, x, y, maxWidth)
          : originalStrokeText.call(this, cleanText, x, y);

        try {
          if (
            isCustomLobbyActive() &&
            !TTWC.badges.domCoversAllPlayers &&
            typeof cleanText === "string"
          ) {
            const index = findPlayerIndexForDrawnText(cleanText);
            if (index >= 0) {
              const label = getClientLabel(index);
              const width = this.measureText(cleanText).width || 0;
              drawCanvasBadge(this, x + width + 8, y, label);
            }
          }
        } catch {}

        return result;
      };

      CanvasRenderingContext2D.prototype.__ttwcCanvasBadgesPatchedV2 = true;
      console.log("[TTWC CLIENT] canvas badge fallback installed V2");
    } catch (e) {
      console.log("[TTWC CLIENT] canvas badge patch error:", e);
    }
  }

  function cleanDOMTextMarkers() {
    try {
      const walker = document.createTreeWalker(
        document.body,
        NodeFilter.SHOW_TEXT
      );

      const nodes = [];

      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node && node.nodeValue && node.nodeValue.includes(MARKER)) {
          nodes.push(node);
        }
      }

      for (const node of nodes) {
        node.nodeValue = stripMarker(node.nodeValue);
      }
    } catch {}
  }

  function tick() {
    try {
      patchSenders();
      patchCanvasBadges();

      if (isCustomLobbyActive()) {
        patchIncomingPlayers();
        cleanDOMTextMarkers();
        injectDomBadges();
      } else {
        removeOldDomBadges();
        TTWC.badges.domCoversAllPlayers = false;
      }
    } catch {}

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  console.log("[TTWC CLIENT] no-server TTWC detection V2 installed");
})();
</script>
