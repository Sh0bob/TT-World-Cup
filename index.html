<script>
(() => {
  function findBtn(label) {
    return Array.from(document.querySelectorAll("button"))
      .find(b => (b.innerText || "").trim().includes(label));
  }

  // Stores target positions once we capture them
  const targets = {
    lobby: null,    // Join/Create should go here (Multiplayer slot)
    settings: null  // FX settings should go here (Custom Scenario slot)
  };

  function captureBox(btn) {
    const rect = btn.getBoundingClientRect();

    // Prefer inline style values if present (common in Territorial UI)
    const left = btn.style.left || (rect.left + "px");
    const top = btn.style.top || (rect.top + "px");
    const width = btn.style.width || (rect.width + "px");
    const height = btn.style.height || (rect.height + "px");
    const font = btn.style.font || getComputedStyle(btn).font;
    const border = btn.style.border || getComputedStyle(btn).border;
    const bg = btn.style.backgroundColor || getComputedStyle(btn).backgroundColor;

    return { left, top, width, height, font, border, bg };
  }

  function applyBox(to, box) {
    if (!to || !box) return;

    // Use !important so we always win
    to.style.setProperty("position", "absolute", "important");
    to.style.setProperty("left", box.left, "important");
    to.style.setProperty("top", box.top, "important");
    to.style.setProperty("width", box.width, "important");
    to.style.setProperty("height", box.height, "important");
    to.style.setProperty("font", box.font, "important");
    to.style.setProperty("border", box.border, "important");
    to.style.setProperty("background-color", box.bg, "important");
  }

  function isMenu() {
    // Same best-effort check as logo: menu exists if the kingdom-name input exists
    return !!document.querySelector('input[placeholder*="Kingdom"]');
  }

  function tick() {
    if (isMenu()) {
      const multiplayer = findBtn("Multiplayer");
      const scenario = findBtn("Custom Scenario");
      const lobby = findBtn("Join/Create custom lobby");
      const settings = findBtn("FX Client settings");

      // Capture big button boxes once
      if (!targets.lobby && multiplayer) targets.lobby = captureBox(multiplayer);
      if (!targets.settings && scenario) targets.settings = captureBox(scenario);

      // Remove unwanted buttons whenever they exist
      if (multiplayer) multiplayer.remove();
      if (scenario) scenario.remove();

      // Move & lock the two remaining buttons into the captured slots
      applyBox(lobby, targets.lobby);
      applyBox(settings, targets.settings);
    }

    requestAnimationFrame(tick);
  }

  console.log("[TTWC] menu button swap active");
  requestAnimationFrame(tick);
})();
  </script>

  <script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.humanNames = [];
  TTWC.anonMap = new Map();
  TTWC.endScreenShown = false;
  TTWC.roundSeeded = false;
  TTWC.lastRoundMarker = "";
  TTWC.autoClickDone = false;

  function onMainMenu() {
    const el = document.querySelector('input[placeholder*="Kingdom"]');
    if (!el) return false;
    const style = getComputedStyle(el);
    if (style.display === "none" || style.visibility === "hidden" || style.opacity === "0") return false;
    const rect = el.getBoundingClientRect();
    return rect.width > 0 && rect.height > 0;
  }

  function getAnon(realName) {
    if (!TTWC.anonMap.has(realName)) {
      TTWC.anonMap.set(realName, "Anon " + Math.floor(1000 + Math.random() * 9000));
    }
    return TTWC.anonMap.get(realName);
  }

  function resetRound() {
    TTWC.humanNames = [];
    TTWC.anonMap.clear();
    TTWC.endScreenShown = false;
    TTWC.roundSeeded = false;
    TTWC.autoClickDone = false;
  }

  function shouldAnonymise() {
    if (onMainMenu()) {
      resetRound();
      return false;
    }
    if (TTWC.endScreenShown) return false;
    return TTWC.humanNames.length > 0;
  }

  function replaceExactNames(text) {
    let out = text;
    const sorted = [...TTWC.humanNames].sort((a, b) => b.length - a.length);

    for (const realName of sorted) {
      const anon = getAnon(realName);

      if (out.includes(realName)) {
        out = out.split(realName).join(anon);
      }

      if (realName.length > 4) {
        const trunc3 = realName.slice(0, Math.max(1, realName.length - 3)) + "...";
        const trunc1 = realName.slice(0, Math.max(1, realName.length - 1)) + "…";

        if (out.includes(trunc3)) out = out.split(trunc3).join(anon);
        if (out.includes(trunc1)) out = out.split(trunc1).join(anon);
      }
    }

    return out;
  }

  function patchPlayerList() {
    const pl = window.__fx?.playerList;
    if (!pl || pl.__ttwcPatched) return;

    const originalDisplay = pl.display;

    pl.display = function(names) {
      const result = originalDisplay.apply(this, arguments);

      try {
        const listRoot = document.getElementById("playerlist");
        const text = listRoot?.innerText || "";
        const match = text.match(/Players\s*\((\d+)\)/i);

        if (Array.isArray(names) && match) {
          const humanCount = parseInt(match[1], 10);
          TTWC.humanNames = names.slice(0, humanCount);
          TTWC.roundSeeded = true;

          // close the list immediately so users don't see it pop up
          try {
            window.__fx?.WindowManager?.closeWindow?.("playerList");
          } catch {}
        }
      } catch {}

      return result;
    };

    pl.__ttwcPatched = true;
    console.log("[TTWC] playerList hook installed");
  }

  const originalFillText = CanvasRenderingContext2D.prototype.fillText;
  const originalDrawImage = CanvasRenderingContext2D.prototype.drawImage;

  CanvasRenderingContext2D.prototype.drawImage = function(...args) {
    try {
      const img = args[0];
      const defeatImg = window.ab?.aHK?.("defeat");
      const victoryImg = window.ab?.aHK?.("victory");

      if (img && (img === defeatImg || img === victoryImg)) {
        TTWC.endScreenShown = true;
      }
    } catch {}

    return originalDrawImage.apply(this, args);
  };

  CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
    try {
      if (typeof text === "string") {
        if (text.includes("Choose your start position!")) {
          if (TTWC.lastRoundMarker !== "spawn") {
            resetRound();
            TTWC.lastRoundMarker = "spawn";
          }
        }

        if (shouldAnonymise()) {
          text = replaceExactNames(text);
        }
      }
    } catch {}

    return originalFillText.call(this, text, x, y, maxWidth);
  };

  const hookTimer = setInterval(() => {
    patchPlayerList();

    // Never try anything on menu / lobby
    if (!onMainMenu() && TTWC.lastRoundMarker === "spawn" && !TTWC.roundSeeded) {
      // Wait for one manual or automatic player-list display hook only during round start
    }
  }, 500);

  console.log("[TTWC] auto-seeding player-list anonymiser active");
})();
  </script>
  
  <script>
(() => {
  // 1) Add logo once
  function ensureLogo() {
    if (document.getElementById("ttwcLogo")) return;
    const img = document.createElement("img");
    img.id = "ttwcLogo";
    img.src = "./assets/ttwc-logo.png";
    img.alt = "TTWC";
    document.body.appendChild(img);
  }

  const TEXT = {
    multiplayer: "Multiplayer",
    scenario: "Custom Scenario",
    settings: "FX Client settings",
    lobby: "Join/Create custom lobby"
  };

  const targets = { lobbyBox: null, settingsBox: null };

  function buttons() {
    return Array.from(document.querySelectorAll("button"));
  }

  function findBtn(label) {
    return buttons().find(b => (b.textContent || "").includes(label));
  }

  function allMatching(label) {
    return buttons().filter(b => (b.textContent || "").includes(label));
  }

  function captureBox(btn) {
    const r = btn.getBoundingClientRect();
    return {
      left: r.left + "px",
      top: r.top + "px",
      width: r.width + "px",
      height: r.height + "px",
      font: getComputedStyle(btn).font,
      border: getComputedStyle(btn).border,
      bg: getComputedStyle(btn).backgroundColor
    };
  }

  function applyBox(btn, box) {
    if (!btn || !box) return;
    btn.style.setProperty("position", "absolute", "important");
    btn.style.setProperty("left", box.left, "important");
    btn.style.setProperty("top", box.top, "important");
    btn.style.setProperty("width", box.width, "important");
    btn.style.setProperty("height", box.height, "important");
    btn.style.setProperty("font", box.font, "important");
    btn.style.setProperty("border", box.border, "important");
    btn.style.setProperty("background-color", box.bg, "important");
    btn.style.setProperty("margin", "0", "important");
  }

  function hide(btn) {
    if (!btn) return;
    btn.style.setProperty("display", "none", "important");
    btn.style.setProperty("pointer-events", "none", "important");
  }

  // Best effort “are we on main menu”
  function isMenu() {
    // Many builds still expose MenuManager; if not, we still run safely.
    try { return window.MenuManager?.getState?.() === 6; } catch { return true; }
  }

  function apply() {
    ensureLogo();

    if (!isMenu()) {
      // Hide logo outside menu (stops it lingering in other screens)
      const logo = document.getElementById("ttwcLogo");
      if (logo) logo.style.display = "none";
      document.body.classList.add("ttwc-ready");
      return;
    } else {
      const logo = document.getElementById("ttwcLogo");
      if (logo) logo.style.display = "";
    }

    const mp = findBtn(TEXT.multiplayer);
    const sc = findBtn(TEXT.scenario);
    const lobby = findBtn(TEXT.lobby);
    const settings = findBtn(TEXT.settings);

    if (!targets.lobbyBox && mp) targets.lobbyBox = captureBox(mp);
    if (!targets.settingsBox && sc) targets.settingsBox = captureBox(sc);

    // Hide unwanted buttons (don’t remove)
    allMatching(TEXT.multiplayer).forEach(hide);
    allMatching(TEXT.scenario).forEach(hide);

    // Move these into the big slots
    applyBox(lobby, targets.lobbyBox);
    applyBox(settings, targets.settingsBox);

    // Done — reveal buttons now that layout is correct
    document.body.classList.add("ttwc-ready");
  }

  // Run now + keep winning when UI rebuilds
  apply();
  new MutationObserver(() => requestAnimationFrame(apply))
    .observe(document.body, { childList: true, subtree: true });

  // Extra retries in case buttons appear slightly later
  let n = 0;
  const t = setInterval(() => {
    apply();
    if (++n > 40) clearInterval(t);
  }, 100);

  console.log("[TTWC] menu + logo script active");
})();
</script>
<script>
(() => {
  function emojisDisabled() {
    try {
      return !!window.__fx?.customLobby?.gameInfo?.disableEmoji;
    } catch {
      return false;
    }
  }

  function stripEmoji(str) {
    return str.replace(
      /[\p{Extended_Pictographic}\p{Emoji_Presentation}\u200d\uFE0F]/gu,
      ""
    );
  }

  function applyEmojiFilter() {
    if (!emojisDisabled()) return;

    document.querySelectorAll("input[type='text']").forEach(input => {
      const clean = stripEmoji(input.value);
      if (input.value !== clean) input.value = clean;
    });
  }

  setInterval(applyEmojiFilter, 100);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};

  TTWC.isHost = TTWC.isHost || false;
  TTWC.peaceCallsUnlocked = false;
  TTWC._peaceUiInstalled = TTWC._peaceUiInstalled || false;

  const CONTROL_MESSAGE_TYPE = "ttwcPeaceToggle";

  function inCustomLobbyClient() {
    try {
      return !!window.__fx?.customLobby?.isActive?.();
    } catch {
      return false;
    }
  }

  function peaceVoteActive() {
    try {
      return !!window.aw?.hq;
    } catch {
      return false;
    }
  }

  function setPeaceUnlocked(value, reason = "") {
    TTWC.peaceCallsUnlocked = !!value;
    updatePeaceUi();
    console.log("[TTWC] peace calls " + (TTWC.peaceCallsUnlocked ? "UNLOCKED" : "LOCKED") + (reason ? " (" + reason + ")" : ""));
  }

  function encodeLobbyControlMessage(type, data) {
    const payload = { t: type, d: data };
    const bytes = new TextEncoder().encode(JSON.stringify(payload));
    const buffer = new ArrayBuffer(bytes.length + 1);

    new DataView(buffer).setUint8(0, 120);
    new Uint8Array(buffer, 1).set(bytes);

    return buffer;
  }

  function sendLobbyControlMessage(type, data) {
    try {
      if (!window.__fx?.customLobby?.__sendRaw) {
        console.log("[TTWC] custom lobby sender not available");
        return false;
      }

      const packet = encodeLobbyControlMessage(type, data);
      window.__fx.customLobby.__sendRaw(1, packet);
      return true;
    } catch (e) {
      console.log("[TTWC] sendLobbyControlMessage error:", e);
      return false;
    }
  }

  function ensurePeaceUi() {
    if (TTWC._peaceUiInstalled) return;

    const wrap = document.createElement("div");
    wrap.id = "ttwc-peace-control";
    Object.assign(wrap.style, {
      position: "fixed",
      top: "12px",
      right: "12px",
      zIndex: "999999",
      display: "none",
      flexDirection: "column",
      gap: "8px",
      alignItems: "flex-end",
      fontFamily: "system-ui, Arial, sans-serif"
    });

    const status = document.createElement("div");
    status.id = "ttwc-peace-status";
    Object.assign(status.style, {
      padding: "8px 12px",
      borderRadius: "10px",
      background: "rgba(0,0,0,0.75)",
      color: "white",
      fontSize: "14px",
      border: "1px solid rgba(255,255,255,0.25)"
    });

    const button = document.createElement("button");
    button.id = "ttwc-peace-toggle";
    button.type = "button";
    button.textContent = "Unlock Peace Calls";
    Object.assign(button.style, {
      padding: "10px 14px",
      borderRadius: "10px",
      border: "1px solid rgba(255,255,255,0.35)",
      background: "rgba(20,20,20,0.9)",
      color: "white",
      cursor: "pointer",
      fontSize: "14px"
    });

    button.addEventListener("click", () => {
      if (!TTWC.isHost) return;

      const nextValue = !TTWC.peaceCallsUnlocked;
      const ok = sendLobbyControlMessage(CONTROL_MESSAGE_TYPE, { unlocked: nextValue });

      if (!ok) {
        console.log("[TTWC] lobby control message failed to send");
        return;
      }

      setPeaceUnlocked(nextValue, "host-toggle");
    });

    wrap.appendChild(status);
    wrap.appendChild(button);
    document.body.appendChild(wrap);

    document.addEventListener("keydown", (e) => {
      if (!TTWC.isHost) return;
      if (!inCustomLobbyClient()) return;

      if (e.code === "F8") {
        e.preventDefault();
        button.click();
      }
    });

    TTWC._peaceUiInstalled = true;
    updatePeaceUi();
  }

  function updatePeaceUi() {
    const wrap = document.getElementById("ttwc-peace-control");
    const status = document.getElementById("ttwc-peace-status");
    const button = document.getElementById("ttwc-peace-toggle");

    if (!wrap || !status || !button) return;

    const show = inCustomLobbyClient();
    wrap.style.display = show ? "flex" : "none";

    status.textContent = "Peace Calls: " + (TTWC.peaceCallsUnlocked ? "UNLOCKED" : "LOCKED");
    status.style.background = TTWC.peaceCallsUnlocked
      ? "rgba(10,120,10,0.8)"
      : "rgba(120,20,20,0.8)";

    button.style.display = TTWC.isHost ? "block" : "none";
    button.textContent = TTWC.peaceCallsUnlocked ? "Lock Peace Calls" : "Unlock Peace Calls";
  }

  function patchCustomLobbyMessages() {
    try {
      if (!window.__fx?.customLobby?.isCustomMessage) return false;
      if (TTWC._peaceMessagePatchInstalled) return true;

      const originalIsCustomMessage = window.__fx.customLobby.isCustomMessage;

      window.__fx.customLobby.isCustomMessage = function(packet) {
        try {
          if (packet && packet[0] === 120 && packet.length > 1) {
            const bytes = new Uint8Array(packet.buffer, 1);
            const msg = JSON.parse(new TextDecoder().decode(bytes));

            if (msg && msg.t === CONTROL_MESSAGE_TYPE) {
              setPeaceUnlocked(!!msg.d?.unlocked, "remote-message");
              return true;
            }

            if (msg && msg.t === "lobby" && msg.d) {
              TTWC.isHost = !!msg.d.isHost;
              setPeaceUnlocked(false, "lobby-reset");
            } else if (msg && msg.t === "host") {
              TTWC.isHost = true;
            }
          }
        } catch (e) {
          console.log("[TTWC] custom lobby message parse error:", e);
        }

        const result = originalIsCustomMessage.apply(this, arguments);
        updatePeaceUi();
        return result;
      };

      TTWC._peaceMessagePatchInstalled = true;
      console.log("[TTWC] custom lobby message patch installed");
      return true;
    } catch (e) {
      console.log("[TTWC] patchCustomLobbyMessages error:", e);
      return false;
    }
  }

  function patchPeaceHotkeyLock() {
    try {
      if (!window.bT || typeof window.bT.hp !== "function") return false;
      if (TTWC._peaceHotkeyLockInstalled) return true;

      const originalPeaceHotkey = window.bT.hp;

      window.bT.hp = function() {
        try {
          if (peaceVoteActive()) {
            return originalPeaceHotkey.apply(this, arguments);
          }

          if (!TTWC.peaceCallsUnlocked) {
            console.log("[TTWC] peace start blocked: locked");
            return;
          }

          return originalPeaceHotkey.apply(this, arguments);
        } catch (e) {
          console.log("[TTWC] patched peace hotkey error:", e);
        }
      };

      TTWC._peaceHotkeyLockInstalled = true;
      console.log("[TTWC] peace hotkey lock installed");
      return true;
    } catch (e) {
      console.log("[TTWC] patchPeaceHotkeyLock error:", e);
      return false;
    }
  }

  function patchPeaceUiLock() {
    if (TTWC._peaceUiLockInstalled) return true;

    function updatePeaceButtons() {
      try {
        const nodes = document.querySelectorAll("button, div, span, p");

        nodes.forEach((node) => {
          const text = (node.textContent || "").trim();
          const isPeaceButton = text === "🕊️ Call Peace Vote" || text === "Call Peace Vote";

          if (!isPeaceButton) return;

          if (!TTWC.peaceCallsUnlocked && !peaceVoteActive()) {
            node.dataset.ttwcPeaceLocked = "1";
            node.style.pointerEvents = "none";
            node.style.opacity = "0.35";
            node.style.filter = "grayscale(1)";
          } else if (node.dataset.ttwcPeaceLocked === "1") {
            node.style.pointerEvents = "";
            node.style.opacity = "";
            node.style.filter = "";
            delete node.dataset.ttwcPeaceLocked;
          }
        });
      } catch (e) {
        console.log("[TTWC] updatePeaceButtons error:", e);
      }
    }

    document.addEventListener("click", (e) => {
      try {
        if (TTWC.peaceCallsUnlocked || peaceVoteActive()) return;

        const target = e.target?.closest?.("button, div, span, p");
        if (!target) return;

        const text = (target.textContent || "").trim();
        if (text === "🕊️ Call Peace Vote" || text === "Call Peace Vote") {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          console.log("[TTWC] peace UI click blocked: locked");
        }
      } catch (err) {
        console.log("[TTWC] peace UI click block error:", err);
      }
    }, true);

    const observer = new MutationObserver(updatePeaceButtons);
    observer.observe(document.body, { childList: true, subtree: true });

    setInterval(updatePeaceButtons, 500);

    TTWC._peaceUiLockInstalled = true;
    console.log("[TTWC] peace UI lock installed");
    return true;
  }

  function patchRoundAutoLock() {
    try {
      if (TTWC._roundAutoLockInstalled) return true;

      const originalFillText = CanvasRenderingContext2D.prototype.fillText;

      CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
        try {
          if (typeof text === "string" && text.includes("Choose your start position!")) {
            if (TTWC._lastPeaceRoundMarker !== "spawn") {
              TTWC._lastPeaceRoundMarker = "spawn";
              setPeaceUnlocked(false, "round-start");
            }
          } else if (typeof text === "string" && !text.includes("Choose your start position!")) {
            TTWC._lastPeaceRoundMarker = "";
          }
        } catch (e) {
          console.log("[TTWC] round auto-lock error:", e);
        }

        return originalFillText.call(this, text, x, y, maxWidth);
      };

      TTWC._roundAutoLockInstalled = true;
      console.log("[TTWC] round auto-lock installed");
      return true;
    } catch (e) {
      console.log("[TTWC] patchRoundAutoLock error:", e);
      return false;
    }
  }

  const installTimer = setInterval(() => {
    ensurePeaceUi();

    const ok1 = patchCustomLobbyMessages();
    const ok2 = patchPeaceHotkeyLock();
    const ok3 = patchPeaceUiLock();
    const ok4 = patchRoundAutoLock();

    updatePeaceUi();

    if (ok1 && ok2 && ok3 && ok4) {
      clearInterval(installTimer);
      console.log("[TTWC] host peace unlock system installed");
    }
  }, 500);
})();
</script>
