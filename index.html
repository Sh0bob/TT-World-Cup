  const labels = [
    "Top Clan",
    "Best Clan Member",
    "Top Admin",
    "Best 1v1 Player"
  ];

  function hideLeaderboard() {
    const nodes = Array.from(document.querySelectorAll("div, span, button"));
    const hit = nodes.find(el =>
      labels.some(label => (el.innerText || "").includes(label))
    );

    if (!hit) return;

    let panel = hit;
    for (let i = 0; i < 8 && panel; i++, panel = panel.parentElement) {
      const r = panel.getBoundingClientRect();
      if (
        r.width > 200 &&
        r.height > 40 &&
        r.left < window.innerWidth * 0.4 &&
        r.top > window.innerHeight * 0.6
      ) {
        panel.style.setProperty("display", "none", "important");
        return;
      }
    }
  }

  function tick() {
    hideLeaderboard();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();

  TTWC.autoClickDone = false;

  function onMainMenu() {
    const el = document.querySelector('input[placeholder*="Kingdom"]');
    if (!el) return false;
    const style = getComputedStyle(el);
    if (style.display === "none" || style.visibility === "hidden" || style.opacity === "0") return false;
    const rect = el.getBoundingClientRect();
    return rect.width > 0 && rect.height > 0;
  }

  function getAnon(realName) {
    if (!TTWC.anonMap.has(realName)) {
      TTWC.anonMap.set(realName, "Anon " + Math.floor(100 + Math.random() * 900));
    }
    return TTWC.anonMap.get(realName);
  }

  function resetRound() {
    TTWC.humanNames = [];
    TTWC.anonMap.clear();
    TTWC.endScreenShown = false;
    TTWC.roundSeeded = false;
    TTWC.autoClickDone = false;
  }

  function shouldAnonymise() {
    if (onMainMenu()) {
      resetRound();
      return false;
    }
    if (TTWC.endScreenShown) return false;
    return TTWC.humanNames.length > 0;
  }

  function replaceExactNames(text) {
    let out = text;
    const sorted = [...TTWC.humanNames].sort((a, b) => b.length - a.length);

    for (const realName of sorted) {
      const anon = getAnon(realName);

      if (out.includes(realName)) {
        out = out.split(realName).join(anon);
      }

      if (realName.length > 4) {
        const trunc3 = realName.slice(0, Math.max(1, realName.length - 3)) + "...";
        const trunc1 = realName.slice(0, Math.max(1, realName.length - 1)) + "…";

        if (out.includes(trunc3)) out = out.split(trunc3).join(anon);
        if (out.includes(trunc1)) out = out.split(trunc1).join(anon);
      }
    }

    return out;
  }

  function patchPlayerList() {
    const pl = window.__fx?.playerList;
    if (!pl || pl.__ttwcPatched) return;

    const originalDisplay = pl.display;

    pl.display = function(names) {
      const result = originalDisplay.apply(this, arguments);

      try {
        const listRoot = document.getElementById("playerlist");
        const text = listRoot?.innerText || "";
        const match = text.match(/Players\s*\((\d+)\)/i);

        if (Array.isArray(names) && match) {
          const humanCount = parseInt(match[1], 10);
          TTWC.humanNames = names.slice(0, humanCount);
          TTWC.roundSeeded = true;

          // close the list immediately so users don't see it pop up
          try {
            window.__fx?.WindowManager?.closeWindow?.("playerList");
          } catch {}
        }
      } catch {}

      return result;
    };

    pl.__ttwcPatched = true;
    console.log("[TTWC] playerList hook installed");
  }

  const originalFillText = CanvasRenderingContext2D.prototype.fillText;
  const originalDrawImage = CanvasRenderingContext2D.prototype.drawImage;

  CanvasRenderingContext2D.prototype.drawImage = function(...args) {
    try {
      const img = args[0];
      const defeatImg = window.ab?.aHK?.("defeat");
      const victoryImg = window.ab?.aHK?.("victory");

      if (img && (img === defeatImg || img === victoryImg)) {
        TTWC.endScreenShown = true;
      }
    } catch {}

    return originalDrawImage.apply(this, args);
  };

  CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
    try {
      if (typeof text === "string") {
        if (text.includes("Choose your start position!")) {
          if (TTWC.lastRoundMarker !== "spawn") {
            resetRound();
            TTWC.lastRoundMarker = "spawn";
          }
        }

        if (shouldAnonymise()) {
          text = replaceExactNames(text);
        }
      }
    } catch {}

    return originalFillText.call(this, text, x, y, maxWidth);
  };

  const hookTimer = setInterval(() => {
    patchPlayerList();

    // Never try anything on menu / lobby
    if (!onMainMenu() && TTWC.lastRoundMarker === "spawn" && !TTWC.roundSeeded) {
      // Wait for one manual or automatic player-list display hook only during round start
    }
  }, 500);

  console.log("[TTWC] auto-seeding player-list anonymiser active");
})();

    btn.style.setProperty("left", box.left, "important");
    btn.style.setProperty("top", box.top, "important");
    btn.style.setProperty("width", box.width, "important");
    btn.style.setProperty("height", box.height, "important");

    if (!isMenu()) {

      if (logo) logo.style.display = "none";

    } else {

    const mp = findBtn(TEXT.multiplayer);
    const sc = findBtn(TEXT.scenario);

    const settings = findBtn(TEXT.settings);

    if (!targets.lobbyBox && mp) targets.lobbyBox = captureBox(mp);
    if (!targets.settingsBox && sc) targets.settingsBox = captureBox(sc);

    // Hide unwanted buttons (don’t remove)
    allMatching(TEXT.multiplayer).forEach(hide);

    // Move these into the big slots
    applyBox(lobby, targets.lobbyBox);

    const yOffset = 14;

if (lobby) {

}

if (settings) {
  const currentTop = parseFloat(settings.style.top || "0");

}

    // Done — reveal buttons now that layout is correct
    document.body.classList.add("ttwc-ready");
  }

  // Run now + keep winning when UI rebuilds
  apply();

          }

        return originalIsCustomMessage.apply(this, arguments);
      };

      TTWC.peace._customLobbyPatched = true;
      console.log("[TTWC PEACE] custom lobby host tracking patched");
      return true;
    } catch (e) {
      console.log("[TTWC PEACE] patchCustomLobbyHostTracking error:", e);
      return false;
    }
  }

  function patchPeaceFunctions() {
    try {
      if (!window.b8 || !window.aw || !window.aD) return false;
      if (!b8.pG || typeof b8.pG.hp !== "function") return false;
      if (typeof aw.ht !== "function") return false;
      if (TTWC.peace.patched) return true;

      TTWC.peace.originalPeaceSend = b8.pG.hp;
      TTWC.peace.originalAwHt = aw.ht;

      // Hide/block normal peace availability for non-hosts in custom lobbies
      aw.ht = function(player) {
  // In custom lobbies: ALWAYS allow the actual host's peace call to pass,
  // on every client, regardless of that client's local state.
  try {
    if (isCustomLobbyActive()) {
      // If we know the lobby players array, trust its host flag.
      if (
        Array.isArray(TTWC.peace.players) &&
        TTWC.peace.players[player] &&
        TTWC.peace.players[player].isHost
      ) {
        return true;
      }
    }
  } catch (e) {}

  // Block non-host self from initiating peace in custom lobbies
  if (
    isCustomLobbyActive() &&
    typeof aD !== "undefined" &&
    player === aD.eo &&
    !isHost()
  ) {
    return false;
  }

  return TTWC.peace.originalAwHt.apply(this, arguments);
};

      // Enforce host-only at the actual peace-send call site
      b8.pG.hp = function(player) {
        try {
          if (
            isCustomLobbyActive() &&
            typeof aD !== "undefined" &&
            player === aD.eo &&
            !isHost()
          ) {
            console.log("[TTWC PEACE] blocked non-host peace send");
            return;
          }
        } catch (e) {}
        return TTWC.peace.originalPeaceSend.apply(this, arguments);
      };

      TTWC.peace.patched = true;
      console.log("[TTWC PEACE] host-only peace patch active");
      return true;
    } catch (e) {
      console.log("[TTWC PEACE] patchPeaceFunctions error:", e);
      return false;
    }
  }

  function sendHostPeaceDirect() {
  try {
    if (!isCustomLobbyActive()) return;
    if (!isHost()) {
      console.log("[TTWC PEACE] not host, direct peace send denied");
      return;
    }

    const now = Date.now();
    if (now - TTWC.peace.lastSendAt < 700) {
      return;
    }
    TTWC.peace.lastSendAt = now;

    if (typeof aD === "undefined") {
      console.log("[TTWC PEACE] aD not ready");
      return;
    }

    const normalCheckAllows = !!(
      TTWC.peace.originalAwHt && TTWC.peace.originalAwHt.call(aw, aD.eo)
    );

    console.log("[TTWC PEACE] host direct peace send", {
      customLobby: true,
      self: aD.eo,
      normalCheckAllows
    });

    // Custom lobby broadcast so other clients see it (custom lobbies may not support vanilla peace packets).
    try {
      const sent = sendCustomLobbyMessage({ t: "peace", d: { from: aD.eo, at: Date.now() } });
      if (sent) {
        console.log("[TTWC PEACE] sent custom peace broadcast");
      }
    } catch (e) {}

    // Send over the real multiplayer transport so other clients observe it.
    // In game.js, peace vote is `b0.pL.pY(513)` when not `aD.kj`.
    if (typeof b0 !== "undefined" && b0.pL && typeof b0.pL.pY === "function") {
      console.log("[TTWC PEACE] using b0.pL.pY transport");
      return b0.pL.pY(513);
    }

    // If the helper isn't available (or custom lobby toggles aD.kj), build and send the exact packet.
    // From game.js `pY(jY)`: bD.a7(15), bD.a8(1, 1), bD.a8(4, 5), bD.a8(10, jY), b0.y.send(b0.y.a2C, bD.aC)
    if (
      typeof b0 !== "undefined" &&
      b0.y &&
      typeof b0.y.send === "function" &&
      typeof b0.y.a2C !== "undefined" &&
      typeof bD !== "undefined" &&
      typeof bD.a7 === "function" &&
      typeof bD.a8 === "function"
    ) {
      try {
        bD.a7(15);
        bD.a8(1, 1);
        bD.a8(4, 5);
        bD.a8(10, 513);
        console.log("[TTWC PEACE] sending raw peace packet", { socket: b0.y.a2C });
        // Prefer the lobby's configured send hook if present (custom lobbies may wrap routing here)
        if (typeof __fx !== "undefined" && __fx.customLobby && typeof __fx.customLobby.send === "function") {
          console.log("[TTWC PEACE] using __fx.customLobby.send transport");
          return __fx.customLobby.send(b0.y.a2C, bD.aC);
        }
        console.log("[TTWC PEACE] using b0.y.send transport");
        return b0.y.send(b0.y.a2C, bD.aC);
      } catch (e) {
        console.log("[TTWC PEACE] raw peace packet send failed", e);
      }
    }

    // Fallback: use the game's in-game handler (may be local-only in some modes).
    if (TTWC.peace.originalPeaceSend) {
      return TTWC.peace.originalPeaceSend.call(b8.pG, aD.eo);
    }

    // Last resort: emit the action locally (may not broadcast).
    if (window.b9 && b9.qB && typeof b9.qB.qC === "function") {
      b9.qB.qC(5, aD.eo, 513);
      if (window.aw && typeof aw.hp === "function") {
        aw.hp(aD.eo);
      }
      return;
    }

    console.log("[TTWC PEACE] peace send APIs not ready");
  } catch (e) {
    console.log("[TTWC PEACE] sendHostPeaceDirect error:", e);
  }
}

  // Host-only floating button
  const peaceBtn = document.createElement("button");
  peaceBtn.id = "ttwc-host-peace-btn";
  peaceBtn.textContent = "Host Peace";
  Object.assign(peaceBtn.style, {
    position: "fixed",
    top: "14px",
    right: "14px",
    zIndex: "99999",
    padding: "10px 14px",
    fontSize: "14px",
    fontWeight: "700",
    borderRadius: "10px",
    border: "1px solid rgba(255,255,255,0.25)",
    background: "rgba(20,20,20,0.85)",
    color: "#fff",
    cursor: "pointer",
    display: "none"
  });

  peaceBtn.addEventListener("click", () => {
    sendHostPeaceDirect();
  });

  document.body.appendChild(peaceBtn);

  function updatePeaceButton() {
    try {
      const show =
        isCustomLobbyActive() &&
        !isMainMenu() &&
        isHost() &&
        window.b8 &&
        b8.hU &&
        typeof b8.hU.hp === "function";

      peaceBtn.style.display = show ? "block" : "none";

      if (show) {
        let dead = false;
        try {
          dead = !!(
            typeof aD !== "undefined" &&
            typeof aw !== "undefined" &&
            TTWC.peace.originalAwHt &&
            !TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (e) {}

        peaceBtn.textContent = dead ? "Host Peace (dead)" : "Host Peace";
      }
    } catch (e) {}

    requestAnimationFrame(updatePeaceButton);
  }
  requestAnimationFrame(updatePeaceButton);

  // Dead-host keyboard fallback:
  // If host is dead, pressing P will still send the real peace packet.
  document.addEventListener("keydown", function(e) {
    try {
      if (e.repeat) return;
      if (!isCustomLobbyActive()) return;
      if (!isHost()) return;

      const tag = e.target && e.target.tagName ? e.target.tagName.toUpperCase() : "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target?.isContentEditable) return;

      if (e.key === "p" || e.key === "P") {
        let normalGameAllowsIt = false;
        try {
          normalGameAllowsIt = !!(
            TTWC.peace.originalAwHt &&
            typeof aD !== "undefined" &&
            TTWC.peace.originalAwHt.call(aw, aD.eo)
          );
        } catch (err) {}

        // Only force-send if the normal game would block it (dead host case)
        if (!normalGameAllowsIt) {
          e.preventDefault();
          e.stopPropagation();
          sendHostPeaceDirect();
        }
      }
    } catch (err) {
      console.log("[TTWC PEACE] keydown handler error:", err);
    }
  }, true);

  const interval = setInterval(() => {
    const a = patchCustomLobbyHostTracking();
    const b = patchPeaceFunctions();
    if (a && b) {
      clearInterval(interval);
    }
  }, 500);
})();
</script>

<script>
(() => {
  const TTWC = window.__TTWC = window.__TTWC || {};
  TTWC.peace = TTWC.peace || {};

  function installPeaceTracing() {
    try {
      if (!window.b8 || !window.b9 || !window.aw || !window.__fx) return false;
      if (!b8.hU || typeof b8.hU.hp !== "function") return false;

      if (TTWC.peace.tracingInstalled) return true;

      TTWC.peace._origTrace_hUhp = b8.hU.hp;

          aD_kj: typeof aD !== "undefined" ? aD.kj : undefined,
          self: typeof aD !== "undefined" ? aD.eo : undefined
        });
        return TTWC.peace._origTrace_hUhp.apply(this, arguments);
      };

      b8.pG.hp = function(player) {
  console.log("[TTWC TRACE] b8.pG.hp called", {

  });

      b9.qB.qC = function() {

      TTWC.peace.tracingInstalled = true;

<script>

      .find(b => (b.innerText || "").toLowerCase().includes(text.toLowerCase()));
  }

    const join = findBtn("Join/Create");

<script>
(() => {
  const video = document.getElementById("ttwc-bg-video");

  function isMainMenu() {
    return !!document.querySelector('input[placeholder*="Kingdom"]');
  }

  function tick() {
    const show = isMainMenu();
    video.style.display = show ? "block" : "none";

    if (show && video.paused) {
      video.play().catch(() => {});

    requestAnimationFrame(tick);

  requestAnimationFrame(tick);
